<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Purchase Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-shopping-cart"></i>
                <h1 th:text="${title}">Purchase Management</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <!-- Search and Add -->
    <div class="search-bar">
        <form action="/purchases/search" method="get" style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
            <input type="text" name="keyword" placeholder="Search by invoice number..." th:value="${keyword}" style="flex: 1;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </form>
        <a href="/purchases/new" class="btn btn-success"><i class="fas fa-plus"></i> New Purchase</a>
    </div>

    <!-- Purchases Table -->
    <div class="table-responsive">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Invoice No</th>
                    <th>Date</th>
                    <th>Supplier</th>
                    <th>Product</th>
                    <th>Store</th>
                    <th>Quantity</th>
                    <th>Unit Cost</th>
                    <th>Total</th>
                    <th>Payment Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${purchases}">
                    <td><strong th:text="${p.invoiceNo}">INV001</strong></td>
                    <td th:text="${#temporals.format(p.purchaseDate, 'dd MMM yyyy')}">2025-01-01</td>
                    <td th:text="${p.supplier.name}">ABC Corp</td>
                    <td th:text="${p.product.name}">Product</td>
                    <td th:text="${p.store.name}">Store</td>
                    <td th:text="${p.quantity}">10</td>
                    <td class="price" th:text="'₹' + ${#numbers.formatDecimal(p.unitCost,1,2)}">₹100</td>
                    <td class="price" th:text="'₹' + ${#numbers.formatDecimal(p.totalCost,1,2)}">₹1000</td>
                    <td>
                                <span class="badge"
                                      th:classappend="${p.paymentStatus == 'PAID'} ? 'badge-success' : (${p.paymentStatus == 'PENDING'} ? 'badge-warning' : 'badge-info')"
                                      th:text="${p.paymentStatus}">PAID</span>
                    </td>
                    <td class="action-links">
                        <a th:href="@{/purchases/view/{id}(id=${p.id})}" class="btn btn-sm btn-view"><i class="fas fa-eye"></i> View</a>
                    </td>
                </tr>
                <tr th:if="${purchases.isEmpty()}">
                    <td colspan="10" class="empty-state">
                        <div class="icon"><i class="fas fa-shopping-cart"></i></div>
                        No purchases recorded. Click "New Purchase" to record one.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
