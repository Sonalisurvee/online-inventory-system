<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Purchase Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 140px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-shopping-cart"></i>
        <h1 th:text="${title}">Purchase Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <h2><i class="fas fa-receipt"></i> Invoice: <span th:text="${purchase.invoiceNo}">INV001</span></h2>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value" th:text="${#temporals.format(purchase.purchaseDate, 'dd MMM yyyy')}">2025-01-01</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Supplier</div>
        <div class="detail-value" th:text="${purchase.supplier.name}">ABC Corp</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Product</div>
        <div class="detail-value" th:text="${purchase.product.name}">Product</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Store</div>
        <div class="detail-value" th:text="${purchase.store.name}">Store</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Quantity</div>
        <div class="detail-value" th:text="${purchase.quantity}">10</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Unit Cost</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(purchase.unitCost,1,2)}">₹100</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Total Cost</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(purchase.totalCost,1,2)}">₹1000</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Payment Status</div>
        <div class="detail-value">
                        <span class="badge"
                              th:classappend="${purchase.paymentStatus == 'PAID'} ? 'badge-success' : (${purchase.paymentStatus == 'PENDING'} ? 'badge-warning' : 'badge-info')"
                              th:text="${purchase.paymentStatus}">PAID</span>
        </div>
      </div>
      <div class="detail-row" th:if="${purchase.notes}">
        <div class="detail-label">Notes</div>
        <div class="detail-value" th:text="${purchase.notes}">Notes</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Recorded By</div>
        <div class="detail-value" th:text="${purchase.user.username}">admin</div>
      </div>
    </div>

    <div class="btn-group">
      <a href="/purchases" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to List</a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
