<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">New Purchase</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .total-preview {
        background: var(--gray-50);
        border-radius: var(--radius);
        padding: var(--spacing-4);
        margin-top: var(--spacing-4);
        text-align: center;
        border: 1px solid var(--gray-200);
    }
    .total-preview strong {
        font-size: 1.25rem;
        color: var(--success-dark);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-shopping-cart"></i>
        <h1 th:text="${title}">New Purchase</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <div class="form-container">
    <form th:action="@{/purchases/save}" method="post" th:object="${purchase}">
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <div class="form-group">
        <label class="required"><i class="fas fa-receipt"></i> Invoice Number</label>
        <input type="text" th:field="*{invoiceNo}" required placeholder="e.g., PUR-001">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-truck"></i> Supplier</label>
          <select name="supplierId" required>
            <option value="">-- Select Supplier --</option>
            <option th:each="s : ${suppliers}" th:value="${s.id}" th:text="${s.name}"></option>
          </select>
        </div>

        <div class="form-group">
          <label class="required"><i class="fas fa-box"></i> Product</label>
          <select name="productId" id="productSelect" required>
            <option value="">-- Select Product --</option>
            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name} + ' (₹' + ${#numbers.formatDecimal(p.unitPrice, 1, 2)} + ')'"></option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-store"></i> Store</label>
          <select name="storeId" required>
            <option value="">-- Select Store --</option>
            <option th:each="s : ${stores}" th:value="${s.id}" th:text="${s.name}"></option>
          </select>
        </div>

        <div class="form-group">
          <label class="required"><i class="fas fa-hashtag"></i> Quantity</label>
          <input type="number" th:field="*{quantity}" id="quantity" min="1" step="1" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-tag"></i> Unit Cost (₹)</label>
          <input type="number" th:field="*{unitCost}" id="unitCost" min="0" step="0.01" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Purchase Date</label>
          <input type="date" th:field="*{purchaseDate}">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-credit-card"></i> Payment Status</label>
        <select th:field="*{paymentStatus}">
          <option value="PENDING">Pending</option>
          <option value="PAID">Paid</option>
          <option value="PARTIAL">Partial</option>
        </select>
      </div>

      <div class="form-group">
        <label><i class="fas fa-pen"></i> Notes</label>
        <textarea th:field="*{notes}" rows="3" placeholder="Optional notes"></textarea>
      </div>

      <div class="total-preview" id="totalPreview">
        <span><i class="fas fa-calculator"></i> Total Cost:</span>
        <strong id="totalAmount">₹0.00</strong>
      </div>

      <div class="btn-group" style="display: flex; gap: var(--spacing-3); margin-top: var(--spacing-6);">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Record Purchase</button>
        <a href="/purchases" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="/purchases"><i class="fas fa-arrow-left"></i> Back to Purchases</a>
  </div>
</div>

<script>
  const quantityInput = document.getElementById('quantity');
  const unitCostInput = document.getElementById('unitCost');
  const totalSpan = document.getElementById('totalAmount');

  function updateTotal() {
      const quantity = parseFloat(quantityInput.value) || 0;
      const unitCost = parseFloat(unitCostInput.value) || 0;
      const total = quantity * unitCost;
      totalSpan.textContent = '₹' + total.toFixed(2);
  }

  quantityInput.addEventListener('input', updateTotal);
  unitCostInput.addEventListener('input', updateTotal);
</script>
</body>
</html>
