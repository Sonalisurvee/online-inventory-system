<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Transfer Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 140px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
    .status-badge {
        display: inline-block;
        padding: 0.25rem 0.75rem;
        border-radius: 30px;
        font-size: 0.75rem;
        font-weight: 600;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-exchange-alt"></i>
        <h1 th:text="${title}">Transfer Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <div>
        <h2><i class="fas fa-exchange-alt"></i> <span th:text="${transfer.transferNo}">TRF001</span></h2>
        <p>Status:
          <span class="status-badge"
                th:classappend="${transfer.status == 'PENDING'} ? 'badge-warning' :
                                              (${transfer.status == 'APPROVED'} ? 'badge-info' :
                                              (${transfer.status == 'COMPLETED'} ? 'badge-success' : 'badge-danger'))"
                th:text="${transfer.status}">PENDING</span>
        </p>
      </div>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Product</div>
        <div class="detail-value" th:text="${transfer.product.name}">Product</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">From Store</div>
        <div class="detail-value" th:text="${transfer.fromStore.name}">Store A</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">To Store</div>
        <div class="detail-value" th:text="${transfer.toStore.name}">Store B</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Quantity</div>
        <div class="detail-value" th:text="${transfer.quantity}">10</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Requested By</div>
        <div class="detail-value" th:text="${transfer.requestedBy.username}">user</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Request Date</div>
        <div class="detail-value" th:text="${#temporals.format(transfer.requestDate, 'dd MMM yyyy')}">2025-03-24</div>
      </div>
      <div class="detail-row" th:if="${transfer.approvedBy != null}">
        <div class="detail-label">Approved By</div>
        <div class="detail-value" th:text="${transfer.approvedBy.username}">manager</div>
      </div>
      <div class="detail-row" th:if="${transfer.completionDate != null}">
        <div class="detail-label">Completed Date</div>
        <div class="detail-value" th:text="${#temporals.format(transfer.completionDate, 'dd MMM yyyy')}">2025-03-24</div>
      </div>
      <div class="detail-row" th:if="${transfer.notes}">
        <div class="detail-label">Notes</div>
        <div class="detail-value" th:text="${transfer.notes}">notes</div>
      </div>
    </div>

    <div class="btn-group">
      <a th:if="${transfer.status == 'PENDING' and (#authentication.authorities.?[authority == 'ROLE_MANAGER' or authority == 'ROLE_ADMIN'].size() > 0)}"
         th:href="@{/transfers/approve/{id}(id=${transfer.id})}" class="btn btn-success"><i class="fas fa-check"></i> Approve Transfer</a>
      <a th:if="${transfer.status == 'APPROVED' and (#authentication.authorities.?[authority == 'ROLE_MANAGER' or authority == 'ROLE_ADMIN'].size() > 0)}"
         th:href="@{/transfers/complete/{id}(id=${transfer.id})}" class="btn btn-primary"><i class="fas fa-truck"></i> Complete Transfer</a>
      <a th:if="${transfer.status == 'PENDING' and (#authentication.authorities.?[authority == 'ROLE_MANAGER' or authority == 'ROLE_ADMIN'].size() > 0)}"
         th:href="@{/transfers/cancel/{id}(id=${transfer.id})}" class="btn btn-danger" onclick="return confirm('Cancel this transfer?')"><i class="fas fa-times"></i> Cancel Transfer</a>
      <a href="/transfers" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to List</a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
