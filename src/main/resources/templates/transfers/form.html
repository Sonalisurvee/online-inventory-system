<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Request Transfer</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-exchange-alt"></i>
                <h1 th:text="${title}">Request Transfer</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <div class="form-container">
        <form th:action="@{/transfers/save}" method="post" th:object="${transfer}">
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required"><i class="fas fa-box"></i> Product</label>
                <select name="productId" required>
                    <option value="">-- Select Product --</option>
                    <option th:each="p : ${products}"
                            th:value="${p.id}"
                            th:text="${p.name}"
                            th:selected="${p.id == selectedProductId}"></option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="required"><i class="fas fa-arrow-right"></i> From Store (Source)</label>
                    <select name="fromStoreId" required>
                        <option value="">-- Source Store --</option>
                        <option th:each="s : ${stores}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${s.id == selectedFromStoreId}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="required"><i class="fas fa-arrow-left"></i> To Store (Destination)</label>
                    <select name="toStoreId" required>
                        <option value="">-- Destination Store --</option>
                        <option th:each="s : ${stores}"
                                th:value="${s.id}"
                                th:text="${s.name}"
                                th:selected="${s.id == selectedToStoreId}"></option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label class="required"><i class="fas fa-hashtag"></i> Quantity to Transfer</label>
                <input type="number" th:field="*{quantity}" min="1" step="1" required>
                <small class="info-text">This quantity will be moved from source to destination store</small>
            </div>

            <div class="form-group">
                <label><i class="fas fa-pen"></i> Notes (Optional)</label>
                <textarea th:field="*{notes}" rows="3" placeholder="Add any notes about this transfer"></textarea>
            </div>

            <div class="alert alert-info" style="margin-top: var(--spacing-4);">
                <i class="fas fa-info-circle"></i>
                <strong>Note:</strong> This transfer request will need manager approval before stock is moved.
            </div>

            <div class="btn-group" style="display: flex; gap: var(--spacing-3); margin-top: var(--spacing-6);">
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Submit Request</button>
                <a href="/transfers" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="/transfers"><i class="fas fa-arrow-left"></i> Back to Transfers</a>
    </div>
</div>
</body>
</html>
