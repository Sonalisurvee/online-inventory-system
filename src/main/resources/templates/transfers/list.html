<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Stock Transfers</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-exchange-alt"></i>
        <h1 th:text="${title}">Stock Transfers</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Filter Bar -->
  <div class="filter-bar" style="background: var(--white); padding: var(--spacing-4); border-radius: var(--radius-lg); margin-bottom: var(--spacing-5); display: flex; gap: var(--spacing-3); flex-wrap: wrap; align-items: center;">
    <form method="get" action="/transfers" style="display: flex; gap: var(--spacing-3); flex-wrap: wrap; align-items: flex-end;">
      <div>
        <label style="font-size: 0.75rem; color: var(--gray-600);">Status:</label>
        <select name="status" style="padding: 0.5rem; border-radius: var(--radius); border: 1px solid var(--gray-300);">
          <option value="">All</option>
          <option value="PENDING" th:selected="${selectedStatus == 'PENDING'}">Pending</option>
          <option value="APPROVED" th:selected="${selectedStatus == 'APPROVED'}">Approved</option>
          <option value="COMPLETED" th:selected="${selectedStatus == 'COMPLETED'}">Completed</option>
          <option value="CANCELLED" th:selected="${selectedStatus == 'CANCELLED'}">Cancelled</option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary"><i class="fas fa-filter"></i> Filter</button>
    </form>
    <div style="flex: 1;"></div>
    <a href="/transfers/new" class="btn btn-success"><i class="fas fa-plus"></i> Request Transfer</a>
  </div>

  <!-- Messages -->
  <div th:if="${success}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <!-- Transfers Table -->
  <div class="table-responsive">
    <div class="table-container">
      <table class="table">
        <thead>
        <tr>
          <th>Transfer No</th>
          <th>Product</th>
          <th>From Store</th>
          <th>To Store</th>
          <th>Quantity</th>
          <th>Requested By</th>
          <th>Request Date</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="t : ${transfers}">
          <td><strong th:text="${t.transferNo}">TRF001</strong></td>
          <td th:text="${t.product.name}">Product</td>
          <td th:text="${t.fromStore.name}">Store A</td>
          <td th:text="${t.toStore.name}">Store B</td>
          <td th:text="${t.quantity}">10</td>
          <td th:text="${t.requestedBy.username}">user</td>
          <td th:text="${#temporals.format(t.requestDate, 'dd MMM yyyy')}">2025-03-26</td>
          <td>
                                <span class="badge"
                                      th:classappend="${t.status == 'PENDING'} ? 'badge-warning' :
                                                      (${t.status == 'APPROVED'} ? 'badge-info' :
                                                      (${t.status == 'COMPLETED'} ? 'badge-success' : 'badge-danger'))"
                                      th:text="${t.status}">PENDING</span>
          </td>
          <td class="action-links">
            <a th:href="@{/transfers/view/{id}(id=${t.id})}" class="btn btn-sm btn-view">
              <i class="fas fa-eye"></i> View
            </a>
            <a th:if="${t.status == 'PENDING'}"
               th:href="@{/transfers/approve/{id}(id=${t.id})}"
               class="btn btn-sm btn-success">
              <i class="fas fa-check"></i> Approve
            </a>
            <a th:if="${t.status == 'APPROVED'}"
               th:href="@{/transfers/complete/{id}(id=${t.id})}"
               class="btn btn-sm btn-primary">
              <i class="fas fa-truck"></i> Complete
            </a>
            <a th:if="${t.status == 'PENDING'}"
               th:href="@{/transfers/cancel/{id}(id=${t.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Cancel this transfer?')">
              <i class="fas fa-times"></i> Cancel
            </a>
          </td>
        </tr>
        <tr th:if="${transfers.isEmpty()}">
          <td colspan="9" class="empty-state">
            <div class="icon"><i class="fas fa-exchange-alt"></i></div>
            No transfers found.
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
