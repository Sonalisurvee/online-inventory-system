<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Transfer Stock Between Stores</title>
  <style>
    /* reuse your existing styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        padding: 20px;
    }
    .container {
        max-width: 700px;
        margin: 0 auto;
    }
    .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
    }
    .header h1 {
        color: #1e293b;
        font-size: 24px;
    }
    .back-btn {
        padding: 8px 15px;
        background: #f1f5f9;
        color: #334155;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }
    .form-card {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .form-group {
        margin-bottom: 20px;
    }
    label {
        display: block;
        margin-bottom: 5px;
        color: #334155;
        font-weight: 500;
        font-size: 14px;
    }
    select, input {
        width: 100%;
        padding: 10px 12px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 14px;
    }
    select:focus, input:focus {
        outline: none;
        border-color: #667eea;
    }
    .store-row {
        display: flex;
        gap: 20px;
        align-items: center;
    }
    .store-row .form-group {
        flex: 1;
    }
    .arrow {
        font-size: 24px;
        color: #94a3b8;
        margin-top: 10px;
    }
    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }
    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s;
        flex: 1;
    }
    .btn-info {
        background: #3b82f6;
        color: white;
    }
    .btn-secondary {
        background: #f1f5f9;
        color: #334155;
    }
    .alert-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
    }
    .info-box {
        background: #f8fafc;
        border-radius: 8px;
        padding: 15px;
        margin-top: 20px;
    }
    .info-title {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 5px;
    }
    .required:after {
        content: " *";
        color: #ef4444;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    <h1>🔄 Transfer Stock Between Stores</h1>
  </div>

  <div th:if="${error}" class="alert-error" th:text="${error}"></div>

  <div class="form-card">
    <form th:action="@{/transfers/save}" method="post" th:object="${transfer}">
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <div class="form-group">
        <label class="required">Select Product</label>
        <select name="productId" required>
          <option value="">-- Choose a Product --</option>
          <option th:each="p : ${products}"
                  th:value="${p.id}"
                  th:text="${p.name} + ' (₹' + ${#numbers.formatDecimal(p.unitPrice, 1, 2)} + ')'"
                  th:selected="${p.id == selectedProductId}">Product</option>
        </select>
      </div>

      <div class="store-row">
        <div class="form-group">
          <label class="required">From Store (Source)</label>
          <select name="fromStoreId" required>
            <option value="">-- Source --</option>
            <option th:each="s : ${stores}"
                    th:value="${s.id}"
                    th:text="${s.name}"
                    th:selected="${s.id == selectedFromStoreId}">Store</option>
          </select>
        </div>
        <div class="arrow">→</div>
        <div class="form-group">
          <label class="required">To Store (Destination)</label>
          <select name="toStoreId" required>
            <option value="">-- Destination --</option>
            <option th:each="s : ${stores}"
                    th:value="${s.id}"
                    th:text="${s.name}"
                    th:selected="${s.id == selectedToStoreId}">Store</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="required">Quantity to Transfer</label>
        <input type="number" name="quantity" min="1" value="1" required>
      </div>

      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea th:field="*{notes}" rows="3"></textarea>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-info">🔄 Transfer Stock</button>
        <a href="/dashboard" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>

  <div class="info-box">
    <div class="info-title">📋 Transfer Rules:</div>
    <ul style="color: #64748b; font-size: 14px; margin-top: 10px; margin-left: 20px;">
      <li>Source and destination stores must be different</li>
      <li>You can only transfer available stock from source store</li>
      <li>The system will automatically update both stores after approval</li>
      <li>Transfer is recorded in audit logs</li>
    </ul>
  </div>
</div>
</body>
</html>
