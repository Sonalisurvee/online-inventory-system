<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Category Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-tag"></i>
                <h1 th:text="${title}">Category Form</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <div class="form-container">
        <form th:action="@{/categories/save}" method="post" th:object="${category}">
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Category Name</label>
                <input type="text" th:field="*{name}" required placeholder="Enter category name">
                <small class="info-text"><i class="fas fa-info-circle"></i> Category name must be unique</small>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Enter category description (optional)"></textarea>
            </div>

            <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Category
                </button>
                <a href="/categories" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="/categories"><i class="fas fa-arrow-left"></i> Back to Categories</a>
    </div>
</div>
</body>
</html>
