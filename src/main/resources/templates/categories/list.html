<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Category Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-tags"></i>
                <h1 th:text="${title}">Category Management</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <!-- Search and Add -->
    <div class="search-bar">
        <form action="/categories/search" method="get" style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
            <input type="text" name="keyword" placeholder="Search categories..." th:value="${keyword}" style="flex: 1;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </form>
        <a href="/categories/new" class="btn btn-success"><i class="fas fa-plus"></i> Add New Category</a>
    </div>

    <!-- Categories Table - Responsive Wrapper -->
    <div class="table-responsive">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Created</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="category : ${categories}">
                    <td th:text="${category.id}">1</td>
                    <td><strong th:text="${category.name}">Electronics</strong></td>
                    <td th:text="${category.description}">Electronic items</td>
                    <td>
                                <span class="badge"
                                      th:classappend="${category.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${category.status}">ACTIVE</span>
                    </td>
                    <td th:text="${#temporals.format(category.createdAt, 'dd-MM-yyyy')}">2024-01-01</td>
                    <td class="action-links">
                        <a th:href="@{/categories/view/{id}(id=${category.id})}" class="btn btn-sm btn-view">
                            <i class="fas fa-eye"></i> View
                        </a>
                        <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-sm btn-edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-sm btn-delete"
                           onclick="return confirm('Are you sure you want to delete this category?')">
                            <i class="fas fa-trash"></i> Delete
                        </a>
                    </td>
                </tr>
                <tr th:if="${categories.isEmpty()}">
                    <td colspan="6" class="empty-state">
                        <div class="icon"><i class="fas fa-tags"></i></div>
                        No categories found. Click "Add New Category" to create one.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
