<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Category Details</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">

    <style>
        .detail-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .detail-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: var(--spacing-6);
            color: var(--white);
        }
        .detail-header h2 {
            color: var(--white);
            margin-bottom: var(--spacing-1);
        }
        .detail-header p {
            opacity: 0.8;
        }
        .detail-body {
            padding: var(--spacing-6);
        }
        .detail-row {
            display: flex;
            padding: var(--spacing-3) 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            width: 120px;
            color: var(--gray-500);
            font-weight: 500;
        }
        .detail-value {
            flex: 1;
            color: var(--gray-700);
        }
        .btn-group {
            padding: var(--spacing-6);
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: var(--spacing-3);
            flex-wrap: wrap;
        }
        /* Fix for button text visibility on hover */
        .btn-primary:hover, .btn-secondary:hover, .btn-edit:hover, .btn-view:hover, .btn-delete:hover, .btn-disable:hover, .btn-enable:hover {
            color: var(--white) !important;
        }
        .btn-secondary:hover {
            color: var(--gray-800) !important;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-tag"></i>
                <h1 th:text="${title}">Category Details</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <div class="detail-card">
        <div class="detail-header">
            <h2 th:text="${category.name}">Category Name</h2>
            <p>Category ID: <span th:text="${category.id}">1</span></p>
        </div>

        <div class="detail-body">
            <div class="detail-row">
                <div class="detail-label">Description</div>
                <div class="detail-value" th:text="${category.description ?: 'No description provided'}">
                    Description here
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Status</div>
                <div class="detail-value">
                        <span class="badge"
                              th:classappend="${category.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                              th:text="${category.status}">ACTIVE</span>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Created</div>
                <div class="detail-value" th:text="${#temporals.format(category.createdAt, 'dd MMM yyyy HH:mm')}">
                    2024-01-01 10:30
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Last Updated</div>
                <div class="detail-value" th:text="${#temporals.format(category.updatedAt, 'dd MMM yyyy HH:mm')}">
                    2024-01-01 10:30
                </div>
            </div>
        </div>

        <div class="btn-group">
            <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-edit">
                <i class="fas fa-edit"></i> Edit Category
            </a>
            <a href="/categories" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>
    </div>

    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
