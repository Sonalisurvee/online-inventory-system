<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Sales Report</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding:20px; }
    .container { max-width: 1200px; margin:0 auto; }
    .header { background:white; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { color:#1e293b; }
    .back-btn { padding:8px 15px; background:#f1f5f9; color:#334155; text-decoration:none; border-radius:6px; }
    .filter-card { background:white; padding:20px; border-radius:12px; margin-bottom:20px; }
    .filter-form { display:flex; gap:15px; align-items:flex-end; flex-wrap:wrap; }
    .form-group { flex:1; min-width:200px; }
    label { display:block; margin-bottom:5px; color:#334155; font-weight:500; font-size:14px; }
    input[type="date"] { width:100%; padding:8px; border:2px solid #e2e8f0; border-radius:6px; }
    button { padding:10px 20px; background:#667eea; color:white; border:none; border-radius:6px; cursor:pointer; }
    .summary { background:#f8fafc; padding:15px; border-radius:8px; margin-bottom:20px; display:flex; justify-content:space-between; }
    table { width:100%; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); border-collapse:collapse; }
    th { background:#f8fafc; padding:12px; text-align:left; }
    td { padding:12px; border-bottom:1px solid #e2e8f0; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📈 Sales Report</h1>
    <a href="/reports" class="back-btn">← Back to Reports</a>
  </div>
  <div class="export-buttons">
    <a th:href="@{/export/sales/excel(startDate=${startDate}, endDate=${endDate})}" class="btn btn-success">📊 Download Excel</a>
    <a th:href="@{/export/sales/pdf(startDate=${startDate}, endDate=${endDate})}" class="btn btn-danger">📄 Download PDF</a>
  </div>
  <div class="filter-card">
    <form class="filter-form" method="get" action="/reports/sales">
      <div class="form-group">
        <label>Start Date</label>
        <input type="date" name="startDate" th:value="${#temporals.format(startDate, 'yyyy-MM-dd')}">
      </div>
      <div class="form-group">
        <label>End Date</label>
        <input type="date" name="endDate" th:value="${#temporals.format(endDate, 'yyyy-MM-dd')}">
      </div>
      <button type="submit">Apply</button>
    </form>
  </div>

  <!-- Chart Section -->
  <div style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
    <h3>📊 Sales Trend</h3>
    <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end;">
      <div>
        <label>Start Date</label>
        <input type="date" id="startDate" th:value="${#temporals.format(startDate, 'yyyy-MM-dd')}" />
      </div>
      <div>
        <label>End Date</label>
        <input type="date" id="endDate" th:value="${#temporals.format(endDate, 'yyyy-MM-dd')}" />
      </div>
      <button id="refreshChart" class="btn btn-primary">Update Chart</button>
    </div>
    <canvas id="salesChart" style="max-height: 300px; width: 100%;"></canvas>
  </div>

  <div class="summary">
    <span>Total Sales: <strong th:text="'₹' + ${#numbers.formatDecimal(totalAmount,1,2)}">0</strong></span>
    <span>Number of Transactions: <strong th:text="${sales.size()}">0</strong></span>
  </div>

  <table>
    <thead>
    <tr>
      <th>Invoice</th>
      <th>Date</th>
      <th>Store</th>
      <th>Product</th>
      <th>Qty</th>
      <th>Total</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="sale : ${sales}">
      <td th:text="${sale.invoiceNo}">INV001</td>
      <td th:text="${sale.saleDate}">2025-03-19</td>
      <td th:text="${sale.store.name}">Store</td>
      <td th:text="${sale.product.name}">Product</td>
      <td th:text="${sale.quantity}">1</td>
      <td th:text="'₹' + ${#numbers.formatDecimal(sale.grandTotal,1,2)}">₹100</td>
    </tr>
    <tr th:if="${sales.isEmpty()}">
      <td colspan="6" style="text-align:center; padding:30px;">No sales in this period.</td>
    </tr>
    </tbody>
  </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  let salesChart;

  function loadChart(startDate, endDate) {
      fetch(`/export/sales-by-date-range?startDate=${startDate}&endDate=${endDate}`)
          .then(response => response.json())
          .then(data => {
              const ctx = document.getElementById('salesChart').getContext('2d');
              if (salesChart) {
                  salesChart.destroy(); // destroy existing chart before creating new
              }
              salesChart = new Chart(ctx, {
                  type: 'bar', // or 'line'
                  data: {
                      labels: data.labels,
                      datasets: [{
                          label: 'Sales (₹)',
                          data: data.amounts,
                          backgroundColor: 'rgba(102, 126, 234, 0.6)',
                          borderColor: 'rgb(102, 126, 234)',
                          borderWidth: 1
                      }]
                  },
                  options: {
                      responsive: true,
                      maintainAspectRatio: true,
                      plugins: {
                          tooltip: {
                              callbacks: {
                                  label: function(context) {
                                      return '₹' + context.raw.toFixed(2);
                                  }
                              }
                          }
                      },
                      scales: {
                          y: {
                              beginAtZero: true,
                              ticks: {
                                  callback: function(value) {
                                      return '₹' + value;
                                  }
                              }
                          }
                      }
                  }
              });
          });
  }

  // Initial load with the current filter values (from server-side)
  const start = document.getElementById('startDate').value;
  const end = document.getElementById('endDate').value;
  loadChart(start, end);

  // Refresh button event
  document.getElementById('refreshChart').addEventListener('click', () => {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      loadChart(start, end);
  });
</script>

</body>
</html>
