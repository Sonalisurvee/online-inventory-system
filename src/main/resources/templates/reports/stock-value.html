<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Stock Value Report</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* reuse styles from dashboard or inventory */
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding:20px; }
    .container { max-width: 1000px; margin:0 auto; }
    .header { background:white; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center; }
    .header h1 { color:#1e293b; }
    .back-btn { padding:8px 15px; background:#f1f5f9; color:#334155; text-decoration:none; border-radius:6px; }
    table { width:100%; background:white; border-radius:12px; overflow:hidden; box-shadow:0 2px 5px rgba(0,0,0,0.1); border-collapse:collapse; }
    th { background:#f8fafc; padding:15px; text-align:left; color:#475569; border-bottom:2px solid #e2e8f0; }
    td { padding:15px; border-bottom:1px solid #e2e8f0; color:#334155; }
    .total-row { font-weight:bold; background:#f1f5f9; }
    .value { font-weight:bold; color:#059669; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 Stock Value Report</h1>
    <a href="/reports" class="back-btn">← Back to Reports</a>
  </div>
  <div class="export-buttons" style="margin-bottom: 20px;">
    <a href="/export/stock-value/excel" class="btn btn-success">📊 Download Excel</a>
    <a href="/export/stock-value/pdf" class="btn btn-danger">📄 Download PDF</a>
  </div>

  <table>
    <thead>
    <tr>
      <th>Store</th>
      <th>Products</th>
      <th>Total Units</th>
      <th>Total Value (₹)</th>
      <th>Low Stock Items</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="store : ${stores}">
      <td th:text="${store.name}">Store</td>
      <td th:text="${reportData[store.name].totalProducts}">0</td>
      <td th:text="${reportData[store.name].totalUnits}">0</td>
      <td class="value" th:text="'₹' + ${#numbers.formatDecimal(reportData[store.name].totalValue,1,2)}">0</td>
      <td>
        <span th:text="${reportData[store.name].lowStockCount}">0</span>
        <span th:if="${reportData[store.name].lowStockCount > 0}" style="color:#f59e0b;">⚠️</span>
      </td>
    </tr>
    <!-- Optional total row -->
    </tbody>
  </table>
</div>

<div style="background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px;">
  <h2>Stock Value by Store</h2>
  <canvas id="stockValueByStoreChart" style="max-height: 400px; width: 100%;"></canvas>
</div>

<div style="background: white; border-radius: 12px; padding: 20px; margin-top: 20px;">
  <h2>Stock Value by Category</h2>
  <canvas id="stockValueByCategoryChart" style="max-height: 500px; width: 100%;"></canvas>
</div>

<script>
  fetch('/export/stock-value-by-store')
      .then(response => response.json())
      .then(data => {
          const ctx = document.getElementById('stockValueByStoreChart').getContext('2d');
          new Chart(ctx, {
              type: 'pie',  // or 'bar' if you prefer, but pie is simple
              data: {
                  labels: data.labels,
                  datasets: [{
                      data: data.values,
                      backgroundColor: [
                          'rgba(102, 126, 234, 0.7)',
                          'rgba(16, 185, 129, 0.7)',
                          'rgba(245, 158, 11, 0.7)',
                          'rgba(239, 68, 68, 0.7)',
                          'rgba(59, 130, 246, 0.7)'
                      ],
                      borderWidth: 1
                  }]
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: true,
                  plugins: {
                      tooltip: {
                          callbacks: {
                              label: function(context) {
                                  let label = context.label || '';
                                  let value = context.raw;
                                  let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                  let percentage = ((value / total) * 100).toFixed(1);
                                  return `${label}: ₹${value.toFixed(2)} (${percentage}%)`;
                              }
                          }
                      },
                      legend: {
                          position: 'bottom'
                      }
                  }
              }
          });
      })
      .catch(error => console.error('Error loading chart:', error));

    fetch('/export/stock-value-by-category')
        .then(response => response.json())
        .then(data => {
            const ctx = document.getElementById('stockValueByCategoryChart').getContext('2d');
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: data.labels,
                    datasets: [{
                        label: 'Stock Value (₹)',
                        data: data.values,
                        backgroundColor: 'rgba(102, 126, 234, 0.6)',
                        borderColor: 'rgb(102, 126, 234)',
                        borderWidth: 1
                    }]
                },
                options: {
                    indexAxis: 'y',  // This makes it horizontal bar chart
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let value = context.raw;
                                    let total = context.dataset.data.reduce((a, b) => a + b, 0);
                                    let percentage = ((value / total) * 100).toFixed(1);
                                    return `₹${value.toFixed(2)} (${percentage}%)`;
                                }
                            }
                        },
                        legend: {
                            position: 'top'
                        }
                    },
                    scales: {
                        x: {
                            title: {
                                display: true,
                                text: 'Stock Value (₹)'
                            },
                            ticks: {
                                callback: function(value) {
                                    return '₹' + value;
                                }
                            }
                        },
                        y: {
                            title: {
                                display: true,
                                text: 'Category'
                            }
                        }
                    }
                }
            });
        })
        .catch(error => console.error('Error loading category chart:', error));

</script>

</body>
</html>
