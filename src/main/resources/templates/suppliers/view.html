<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Supplier Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-header p {
        opacity: 0.8;
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 140px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-truck"></i>
        <h1 th:text="${title}">Supplier Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <h2 th:text="${supplier.name}">Supplier Name</h2>
      <p>Supplier ID: <span th:text="${supplier.id}">1</span></p>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Contact Person</div>
        <div class="detail-value" th:text="${supplier.contactPerson ?: 'N/A'}">John</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Phone</div>
        <div class="detail-value" th:text="${supplier.phone ?: 'N/A'}">123456</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Email</div>
        <div class="detail-value" th:text="${supplier.email ?: 'N/A'}">a@b.com</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Address</div>
        <div class="detail-value" th:text="${supplier.address ?: 'N/A'}">Address</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">GST Number</div>
        <div class="detail-value" th:text="${supplier.gstNumber ?: 'N/A'}">GST123</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value">
                        <span class="badge"
                              th:classappend="${supplier.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                              th:text="${supplier.status}">ACTIVE</span>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Created</div>
        <div class="detail-value" th:text="${#temporals.format(supplier.createdAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Last Updated</div>
        <div class="detail-value" th:text="${#temporals.format(supplier.updatedAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>
    </div>

    <div class="btn-group">
      <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}" class="btn btn-edit">
        <i class="fas fa-edit"></i> Edit Supplier
      </a>
      <a href="/suppliers" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to List
      </a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
