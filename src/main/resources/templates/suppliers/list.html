<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Supplier Management</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-truck"></i>
        <h1 th:text="${title}">Supplier Management</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div th:if="${success}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <!-- Export Buttons -->
  <div class="filter-bar" style="background: var(--white); padding: var(--spacing-4); border-radius: var(--radius-lg); margin-bottom: var(--spacing-5); display: flex; gap: var(--spacing-3); flex-wrap: wrap; justify-content: flex-end;">
    <a href="/export/suppliers/excel" class="btn btn-sm btn-success"><i class="fas fa-file-excel"></i> Export Excel</a>
    <a href="/export/suppliers/pdf" class="btn btn-sm btn-danger"><i class="fas fa-file-pdf"></i> Export PDF</a>
  </div>

  <!-- Search and Add -->
  <div class="search-bar">
    <form action="/suppliers/search" method="get" style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
      <input type="text" name="keyword" placeholder="Search suppliers by name..." th:value="${keyword}" style="flex: 1;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
    </form>
    <a href="/suppliers/new" class="btn btn-success"><i class="fas fa-plus"></i> Add New Supplier</a>
  </div>

  <!-- Suppliers Table -->
  <div class="table-responsive">
    <div class="table-container">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Contact Person</th>
          <th>Phone</th>
          <th>Email</th>
          <th>GST</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="supplier : ${suppliers}">
          <td th:text="${supplier.id}">1</td>
          <td><strong th:text="${supplier.name}">ABC Corp</strong></td>
          <td th:text="${supplier.contactPerson}">John Doe</td>
          <td th:text="${supplier.phone}">1234567890</td>
          <td th:text="${supplier.email}">john@abc.com</td>
          <td th:text="${supplier.gstNumber}">GST123</td>
          <td>
                                <span class="badge"
                                      th:classappend="${supplier.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${supplier.status}">ACTIVE</span>
          </td>
          <td class="action-links">
            <a th:href="@{/suppliers/view/{id}(id=${supplier.id})}" class="btn btn-sm btn-view">
              <i class="fas fa-eye"></i> View
            </a>
            <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}" class="btn btn-sm btn-edit">
              <i class="fas fa-edit"></i> Edit
            </a>
            <a th:href="@{/suppliers/delete/{id}(id=${supplier.id})}" class="btn btn-sm btn-delete"
               onclick="return confirm('Are you sure you want to delete this supplier?')">
              <i class="fas fa-trash"></i> Delete
            </a>
          </td>
        </tr>
        <tr th:if="${suppliers.isEmpty()}">
          <td colspan="8" class="empty-state">
            <div class="icon"><i class="fas fa-truck"></i></div>
            No suppliers found. Click "Add New Supplier" to create one.
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
