<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Supplier Management</title>
  <style>
    /* Copy all your existing styles here */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        padding: 20px;
    }

    .container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .header h1 {
        color: #333;
        font-size: 24px;
    }

    .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover {
        background: #5a67d8;
        transform: translateY(-2px);
    }

    .btn-sm {
        padding: 5px 10px;
        font-size: 12px;
        margin: 0 2px;
    }

    .btn-info {
        background: #4299e1;
        color: white;
    }

    .btn-warning {
        background: #ecc94b;
        color: #744210;
    }

    .btn-success {
        background: #48bb78;
        color: white;
    }

    .btn-danger {
        background: #f56565;
        color: white;
    }

    .alert {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .alert-success {
        background: #c6f6d5;
        color: #22543d;
        border: 1px solid #9ae6b4;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .search-box {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        display: flex;
        gap: 10px;
    }

    .search-box input {
        flex: 1;
        padding: 10px;
        border: 2px solid #e2e8f0;
        border-radius: 5px;
        font-size: 14px;
    }

    .search-box input:focus {
        outline: none;
        border-color: #667eea;
    }

    .search-box button {
        padding: 10px 20px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .table-container {
        background: white;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        overflow: hidden;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th {
        background: #f7fafc;
        padding: 15px;
        text-align: left;
        font-weight: 600;
        color: #4a5568;
        border-bottom: 2px solid #e2e8f0;
    }

    td {
        padding: 15px;
        border-bottom: 1px solid #e2e8f0;
        color: #4a5568;
    }

    tr:hover {
        background: #f7fafc;
    }

    .badge {
        padding: 5px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }

    .badge-active {
        background: #c6f6d5;
        color: #22543d;
    }

    .badge-inactive {
        background: #fed7d7;
        color: #742a2a;
    }

    .action-links a {
        text-decoration: none;
        margin-right: 5px;
    }

    .empty-state {
        text-align: center;
        padding: 50px;
        color: #a0aec0;
    }

    .back-link {
        margin-top: 20px;
        text-align: center;
    }

    .back-link a {
        color: #667eea;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }

    .btn-info {
    background: #3b82f6;
    color: white;
}
.btn-info:hover {
    background: #2563eb;
}
  </style>

  </head>
  <body>
  <div class="container">
    <div class="header">
      <h1 th:text="${title}">Supplier Management</h1>
      <a href="/suppliers/new" class="btn btn-primary">➕ Add New Supplier</a>
    </div>
    <a href="/export/suppliers/excel" class="btn btn-success" style="margin-left: 10px;">📊 Export Excel</a>
    <a href="/export/suppliers/pdf" class="btn btn-danger" style="margin-left: 5px;">📄 Export PDF</a>
    <!-- Search box -->
    <div class="search-box">
      <form action="/suppliers/search" method="get">
        <input type="text" name="keyword" placeholder="Search suppliers..." th:value="${keyword}">
        <button type="submit">🔍 Search</button>
      </form>
    </div>

    <!-- Success/Error messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="table-container">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Contact Person</th>
          <th>Phone</th>
          <th>Email</th>
          <th>GST</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="supplier : ${suppliers}">
          <td th:text="${supplier.id}">1</td>
          <td th:text="${supplier.name}">ABC Corp</td>
          <td th:text="${supplier.contactPerson}">John Doe</td>
          <td th:text="${supplier.phone}">1234567890</td>
          <td th:text="${supplier.email}">john@abc.com</td>
          <td th:text="${supplier.gstNumber}">GST123</td>
          <td>
                            <span class="badge" th:classappend="${supplier.status == 'ACTIVE'} ? 'badge-active' : 'badge-inactive'"
                                  th:text="${supplier.status}">ACTIVE</span>
          </td>
          <td>
            <a th:href="@{/suppliers/view/{id}(id=${supplier.id})}" class="btn btn-sm btn-info">View</a>
            <a th:href="@{/suppliers/edit/{id}(id=${supplier.id})}" class="btn btn-sm btn-warning">Edit</a>
            <a th:href="@{/suppliers/delete/{id}(id=${supplier.id})}" class="btn btn-sm btn-danger"
               onclick="return confirm('Are you sure?')">Delete</a>
          </td>
        </tr>
        <tr th:if="${suppliers.isEmpty()}">
          <td colspan="8" class="empty-state">No suppliers found.</td>
        </tr>
        </tbody>
      </table>
    </div>

    <div class="back-link">
      <a href="/dashboard">← Back to Dashboard</a>
    </div>
  </div>
  </body>
  </html>
