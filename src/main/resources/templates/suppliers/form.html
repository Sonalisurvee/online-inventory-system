<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Supplier Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-truck"></i>
                <h1 th:text="${title}">Supplier Form</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <div class="form-container">
        <form th:action="@{/suppliers/save}" method="post" th:object="${supplier}">
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Supplier Name</label>
                <input type="text" th:field="*{name}" required placeholder="Enter supplier name">
            </div>

            <div class="form-group">
                <label>Contact Person</label>
                <input type="text" th:field="*{contactPerson}" placeholder="Enter contact person name">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" th:field="*{phone}" placeholder="Enter phone number">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" placeholder="Enter email address">
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea th:field="*{address}" rows="3" placeholder="Enter supplier address"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>GST Number</label>
                    <input type="text" th:field="*{gstNumber}" placeholder="Enter GST number">
                </div>
            </div>

            <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Supplier
                </button>
                <a href="/suppliers" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="/suppliers"><i class="fas fa-arrow-left"></i> Back to Suppliers</a>
    </div>
</div>
</body>
</html>
