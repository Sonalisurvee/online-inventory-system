<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Assign Manager</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .store-info {
        background: var(--gray-50);
        padding: var(--spacing-4);
        border-radius: var(--radius);
        margin-bottom: var(--spacing-5);
        border-left: 4px solid var(--primary);
    }
    .store-info h3 {
        margin-bottom: var(--spacing-2);
        color: var(--gray-800);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-user-tie"></i>
        <h1 th:text="${title}">Assign Manager</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div class="form-container">
    <div class="store-info">
      <h3 th:text="${store.name}">Store Name</h3>
      <p th:text="${store.location}">Store Location</p>
      <p>Current Manager: <strong th:text="${store.manager?.username ?: 'None'}">manager1</strong></p>
    </div>

    <form th:action="@{/stores/assign-manager/{id}(id=${store.id})}" method="post">
      <div class="form-group">
        <label>Select Manager</label>
        <select name="managerId" required>
          <option value="">-- Choose a Manager --</option>
          <option th:each="manager : ${managers}"
                  th:value="${manager.id}"
                  th:text="${manager.username} + ' (' + ${manager.email} + ')'"
                  th:selected="${store.manager != null and manager.id == store.manager.id}">
          </option>
        </select>
        <small class="info-text">Select a manager to assign to this store</small>
      </div>

      <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-check"></i> Assign Manager
        </button>
        <a th:href="@{/stores/view/{id}(id=${store.id})}" class="btn btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="/stores"><i class="fas fa-arrow-left"></i> Back to Stores</a>
  </div>
</div>
</body>
</html>
