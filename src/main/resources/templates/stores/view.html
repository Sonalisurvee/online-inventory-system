<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Store Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
        display: flex;
        align-items: center;
        gap: var(--spacing-5);
        flex-wrap: wrap;
    }
    .store-icon {
        width: 70px;
        height: 70px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: bold;
        color: var(--white);
    }
    .store-title h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .store-title p {
        opacity: 0.8;
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 150px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-store"></i>
        <h1 th:text="${title}">Store Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <div class="store-icon" th:text="${#strings.substring(store.name, 0, 1).toUpperCase()}">
        S
      </div>
      <div class="store-title">
        <h2 th:text="${store.name}">Store Name</h2>
        <p th:text="${store.location}">Store Location</p>
      </div>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Store ID</div>
        <div class="detail-value" th:text="${store.id}">1</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Location</div>
        <div class="detail-value" th:text="${store.location}">New Delhi</div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Manager</div>
        <div class="detail-value" th:text="${store.manager?.username ?: 'Not Assigned'}">
          manager1
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Phone</div>
        <div class="detail-value" th:text="${store.phone ?: 'Not provided'}">
          1234567890
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Email</div>
        <div class="detail-value" th:text="${store.email ?: 'Not provided'}">
          store@example.com
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value">
                        <span class="badge"
                              th:classappend="${store.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                              th:text="${store.status}">ACTIVE</span>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Created</div>
        <div class="detail-value" th:text="${#temporals.format(store.createdAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Last Updated</div>
        <div class="detail-value" th:text="${#temporals.format(store.updatedAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>
    </div>

    <div class="btn-group">
      <a th:href="@{/stores/edit/{id}(id=${store.id})}" class="btn btn-edit">
        <i class="fas fa-edit"></i> Edit Store
      </a>
      <a th:href="@{/stores/assign-manager/{id}(id=${store.id})}" class="btn btn-warning">
        <i class="fas fa-user-tie"></i> Assign Manager
      </a>
      <a href="/stores" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to List
      </a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
