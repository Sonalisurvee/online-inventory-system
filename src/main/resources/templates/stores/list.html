<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Store Management</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-store"></i>
        <h1 th:text="${title}">Store Management</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div th:if="${success}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
  </div>
  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <!-- Search and Add -->
  <div class="search-bar">
    <form action="/stores/search" method="get" style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
      <input type="text" name="keyword" placeholder="Search stores by name or location..." th:value="${keyword}" style="flex: 1;">
      <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
    </form>
    <a href="/stores/new" class="btn btn-success"><i class="fas fa-plus"></i> Add New Store</a>
  </div>

  <!-- Stores Table -->
  <div class="table-responsive">
    <div class="table-container">
      <table>
        <thead>
        <tr>
          <th>ID</th>
          <th>Store Name</th>
          <th>Location</th>
          <th>Manager</th>
          <th>Phone</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="store : ${stores}">
          <td th:text="${store.id}">1</td>
          <td><strong th:text="${store.name}">Main Store</strong></td>
          <td th:text="${store.location}">New Delhi</td>
          <td th:text="${store.manager?.username ?: 'Not Assigned'}">manager1</td>
          <td th:text="${store.phone ?: 'N/A'}">1234567890</td>
          <td>
                                <span class="badge"
                                      th:classappend="${store.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                                      th:text="${store.status}">ACTIVE</span>
          </td>
          <td class="action-links">
            <a th:href="@{/stock/view/{id}(id=${store.id})}" class="btn btn-sm btn-info">
              <i class="fas fa-boxes"></i> Inventory
            </a>
            <a th:href="@{/stores/view/{id}(id=${store.id})}" class="btn btn-sm btn-view">
              <i class="fas fa-eye"></i> View
            </a>
            <a th:href="@{/stores/edit/{id}(id=${store.id})}" class="btn btn-sm btn-edit">
              <i class="fas fa-edit"></i> Edit
            </a>
            <a th:href="@{/stores/assign-manager/{id}(id=${store.id})}" class="btn btn-sm btn-warning">
              <i class="fas fa-user-tie"></i> Assign Manager
            </a>
            <a th:href="@{/stores/delete/{id}(id=${store.id})}" class="btn btn-sm btn-delete"
               onclick="return confirm('Are you sure you want to delete this store?')">
              <i class="fas fa-trash"></i> Delete
            </a>
          </td>
        </tr>
        <tr th:if="${stores.isEmpty()}">
          <td colspan="7" class="empty-state">
            <div class="icon"><i class="fas fa-store-slash"></i></div>
            No stores found. Click "Add New Store" to create one.
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
