<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Store Form</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-store"></i>
        <h1 th:text="${title}">Store Form</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <div class="form-container">
    <form th:action="@{/stores/save}" method="post" th:object="${store}">
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <div class="form-group">
        <label class="required">Store Name</label>
        <input type="text" name="name" th:value="*{name}" required placeholder="Enter store name">
      </div>

      <div class="form-group">
        <label class="required">Location</label>
        <textarea name="location" required placeholder="Enter store address" th:text="*{location}"></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="tel" name="phone" th:value="*{phone}" placeholder="Enter phone number">
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" th:value="*{email}" placeholder="Enter email address">
        </div>
      </div>

      <div class="form-group">
        <label>Assign Manager (Optional)</label>
        <select name="managerId">
          <option value="">-- No Manager --</option>
          <option th:each="manager : ${managers}"
                  th:value="${manager.id}"
                  th:text="${manager.username} + ' (' + ${manager.email} + ')'"
                  th:selected="${manager.id == selectedManagerId}">
          </option>
        </select>
        <small class="info-text">Manager can be assigned later if needed</small>
      </div>

      <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
        <button type="submit" class="btn btn-primary">
          <i class="fas fa-save"></i> Save Store
        </button>
        <a href="/stores" class="btn btn-secondary">
          <i class="fas fa-times"></i> Cancel
        </a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="/stores"><i class="fas fa-arrow-left"></i> Back to Stores</a>
  </div>
</div>
</body>
</html>
