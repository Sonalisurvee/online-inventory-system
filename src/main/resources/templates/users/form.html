<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">User Form</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- External CSS Files -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-user-plus"></i>
                <h1 th:text="${title}">User Form</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error message</span>
    </div>

    <!-- Form Container -->
    <div class="form-container">
        <form th:action="@{/users/save}" method="post" th:object="${user}">
            <!-- Hidden ID field for edit -->
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Username</label>
                <input type="text" th:field="*{username}" required
                       placeholder="Enter username (min 3 characters)">
                <small class="info-text"><i class="fas fa-info-circle"></i> Username must be unique and at least 3 characters</small>
            </div>

            <div class="form-group">
                <label th:classappend="${user.id == null} ? 'required'"
                       th:text="${user.id == null} ? 'Password' : 'Password (leave blank to keep current)'">
                    Password
                </label>
                <input type="password" th:field="*{password}"
                       th:required="${user.id == null}"
                       placeholder="Enter password">
                <small class="info-text" th:if="${user.id != null}"><i class="fas fa-info-circle"></i> Only fill if you want to change password</small>
            </div>

            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" th:field="*{email}" required
                       placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" th:field="*{phone}"
                       placeholder="Enter phone number (optional)">
            </div>

            <div class="form-group">
                <label class="required">Role</label>
                <select th:field="*{role}" required>
                    <option value="">Select Role</option>
                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}">ADMIN</option>
                </select>
                <small class="info-text"><i class="fas fa-info-circle"></i> Role determines what the user can access</small>
            </div>

            <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save User
                </button>
                <a href="/users" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="/users"><i class="fas fa-arrow-left"></i> Back to Users List</a>
    </div>
</div>
</body>
</html>
