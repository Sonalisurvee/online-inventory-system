<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">User Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #a0aec0;
            color: white;
        }

        .btn-secondary:hover {
            background: #718096;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .required:after {
            content: " *";
            color: #f56565;
        }

        .info-text {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1 th:text="${title}">Add New User</h1>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}">
        Error message
    </div>

    <!-- Form -->
    <div class="form-container">
        <form th:action="@{/users/save}" method="post" th:object="${user}">
            <!-- Hidden ID field for edit -->
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Username</label>
                <input type="text" th:field="*{username}" required
                       placeholder="Enter username (min 3 characters)">
                <div class="info-text">Username must be unique and at least 3 characters</div>
            </div>

            <div class="form-group">
                <label th:classappend="${user.id == null} ? 'required'"
                       th:text="${user.id == null} ? 'Password' : 'Password (leave blank to keep current)'">
                    Password
                </label>
                <input type="password" th:field="*{password}"
                       th:required="${user.id == null}"
                       placeholder="Enter password">
            </div>

            <div class="form-group">
                <label class="required">Email</label>
                <input type="email" th:field="*{email}" required
                       placeholder="Enter email address">
            </div>

            <div class="form-group">
                <label>Phone</label>
                <input type="tel" th:field="*{phone}"
                       placeholder="Enter phone number (optional)">
            </div>

            <div class="form-group">
                <label class="required">Role</label>
                <select th:field="*{role}" required>
                    <option value="">Select Role</option>
                    <option th:each="role : ${roles}"
                            th:value="${role}"
                            th:text="${role}">ADMIN</option>
                </select>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">💾 Save User</button>
                <a href="/users" class="btn btn-secondary">↩ Cancel</a>
            </div>
        </form>
    </div>

    <!-- Back to Users List -->
    <div class="back-link">
        <a href="/users">← Back to Users List</a>
    </div>
</div>
</body>
</html>
