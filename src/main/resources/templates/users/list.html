<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">User Management</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-users"></i>
                <h1 th:text="${title}">User Management</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <!-- Messages -->
    <div th:if="${success}" class="alert alert-success">
        <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
    </div>
    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <!-- Search and Add Button -->
    <div class="search-bar">
        <form action="/users/search" method="get" style="display: flex; width: 100%; gap: 10px; flex-wrap: wrap;">
            <input type="text" name="keyword" placeholder="Search users by username or email..." th:value="${keyword}" style="flex: 1;">
            <button type="submit" class="btn btn-primary"><i class="fas fa-search"></i> Search</button>
        </form>
        <a href="/users/new" class="btn btn-success"><i class="fas fa-plus"></i> Add New User</a>
    </div>

    <!-- Users Table - Responsive Wrapper -->
    <div class="table-responsive">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Role</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.id}">1</td>
                    <td><strong th:text="${user.username}">admin</strong></td>
                    <td th:text="${user.email}">admin@test.com</td>
                    <td th:text="${user.phone ?: 'N/A'}">1234567890</td>
                    <td>
                                <span class="badge"
                                      th:classappend="${user.role.name() == 'ADMIN' ? 'badge-info' :
                                                     (user.role.name() == 'MANAGER' ? 'badge-warning' : 'badge-success')}"
                                      th:text="${user.role}">ADMIN</span>
                    </td>
                    <td>
                                <span class="badge"
                                      th:classappend="${user.enabled} ? 'badge-success' : 'badge-danger'"
                                      th:text="${user.enabled} ? 'ENABLED' : 'DISABLED'">ENABLED</span>
                    </td>
                    <td class="action-links">
                        <a th:href="@{/users/view/{id}(id=${user.id})}" class="btn btn-sm btn-view">
                            <i class="fas fa-eye"></i> View
                        </a>
                        <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-edit">
                            <i class="fas fa-edit"></i> Edit
                        </a>
                        <a th:href="@{/users/toggle/{id}(id=${user.id})}"
                           class="btn btn-sm"
                           th:classappend="${user.enabled} ? 'btn-disable' : 'btn-enable'"
                           th:text="${user.enabled} ? 'Disable' : 'Enable'">
                            <i class="fas" th:classappend="${user.enabled} ? 'fa-ban' : 'fa-check'"></i>
                            <span th:text="${user.enabled} ? 'Disable' : 'Enable'"></span>
                        </a>
                        <a th:href="@{/users/delete/{id}(id=${user.id})}"
                           class="btn btn-sm btn-delete"
                           onclick="return confirm('Are you sure you want to delete this user?')">
                            <i class="fas fa-trash"></i> Delete
                        </a>
                    </td>
                </tr>

                <!-- Empty state -->
                <tr th:if="${users.isEmpty()}">
                    <td colspan="7" class="empty-state">
                        <div class="icon"><i class="fas fa-users-slash"></i></div>
                        No users found. Click "Add New User" to create one.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Back to Dashboard -->
    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
