<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">User Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
        }

        .btn-success {
            background: #48bb78;
            color: white;
        }

        .btn-warning {
            background: #ecc94b;
            color: #744210;
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
            margin: 0 2px;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #c6f6d5;
            color: #22543d;
            border: 1px solid #9ae6b4;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: #f7fafc;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            border-bottom: 2px solid #e2e8f0;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e2e8f0;
            color: #4a5568;
        }

        tr:hover {
            background: #f7fafc;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-admin {
            background: #9f7aea;
            color: white;
        }

        .badge-manager {
            background: #4299e1;
            color: white;
        }

        .badge-staff {
            background: #48bb78;
            color: white;
        }

        .badge-enabled {
            background: #c6f6d5;
            color: #22543d;
        }

        .badge-disabled {
            background: #fed7d7;
            color: #742a2a;
        }

        .action-links a {
            text-decoration: none;
            margin-right: 10px;
            color: #667eea;
        }

        .action-links a:hover {
            text-decoration: underline;
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #a0aec0;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1 th:text="${title}">User Management</h1>
        <a href="/users/new" class="btn btn-primary">➕ Add New User</a>
    </div>

    <!-- Success/Error Messages -->
    <div th:if="${success}" class="alert alert-success" th:text="${success}">
        Success message
    </div>

    <div th:if="${error}" class="alert alert-error" th:text="${error}">
        Error message
    </div>

    <!-- Users Table -->
    <div class="table-container">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Role</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
                <td th:text="${user.id}">1</td>
                <td th:text="${user.username}">admin</td>
                <td th:text="${user.email}">admin@test.com</td>
                <td th:text="${user.phone ?: 'N/A'}">1234567890</td>
                <td>
                            <span class="badge"
                                  th:classappend="${user.role.name() == 'ADMIN' ? 'badge-admin' :
                                                     (user.role.name() == 'MANAGER' ? 'badge-manager' : 'badge-staff')}"
                                  th:text="${user.role}">ADMIN</span>
                </td>
                <td>
                            <span class="badge"
                                  th:classappend="${user.enabled} ? 'badge-enabled' : 'badge-disabled'"
                                  th:text="${user.enabled} ? 'ENABLED' : 'DISABLED'">ENABLED</span>
                </td>
                <td class="action-links">
                    <a th:href="@{/users/view/{id}(id=${user.id})}" class="btn btn-sm btn-primary">View</a>
                    <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-sm btn-warning">Edit</a>
                    <a th:href="@{/users/toggle/{id}(id=${user.id})}"
                       class="btn btn-sm"
                       th:classappend="${user.enabled} ? 'btn-danger' : 'btn-success'"
                       th:text="${user.enabled} ? 'Disable' : 'Enable'">Disable</a>
                    <a th:href="@{/users/delete/{id}(id=${user.id})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('Are you sure you want to delete this user?')">Delete</a>
                </td>
            </tr>

            <!-- Empty state -->
            <tr th:if="${users.isEmpty()}">
                <td colspan="7" class="empty-state">
                    No users found. Click "Add New User" to create one.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- Back to Dashboard -->
    <div class="back-link">
        <a href="/dashboard">← Back to Dashboard</a>
    </div>
</div>
</body>
</html>
