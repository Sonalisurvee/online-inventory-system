<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">User Details</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- External CSS Files -->
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">

    <style>
        /* Additional styles specific to user details */
        .detail-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        .detail-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: var(--spacing-6);
            color: var(--white);
            display: flex;
            align-items: center;
            gap: var(--spacing-5);
        }
        .avatar {
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: var(--white);
        }
        .user-title h2 {
            color: var(--white);
            margin-bottom: var(--spacing-1);
        }
        .user-title p {
            opacity: 0.8;
        }
        .detail-body {
            padding: var(--spacing-6);
        }
        .detail-row {
            display: flex;
            padding: var(--spacing-3) 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .detail-row:last-child {
            border-bottom: none;
        }
        .detail-label {
            width: 140px;
            color: var(--gray-500);
            font-weight: 500;
        }
        .detail-value {
            flex: 1;
            color: var(--gray-700);
            font-weight: 500;
        }
        .btn-group {
            padding: var(--spacing-6);
            border-top: 1px solid var(--gray-200);
            display: flex;
            gap: var(--spacing-3);
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-user"></i>
                <h1 th:text="${title}">User Details</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <div class="detail-card">
        <div class="detail-header">
            <div class="avatar" th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">
                A
            </div>
            <div class="user-title">
                <h2 th:text="${user.username}">username</h2>
                <p><i class="fas fa-calendar-alt"></i> Member since: <span th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy')}">2024-01-01</span></p>
            </div>
        </div>

        <div class="detail-body">
            <div class="detail-row">
                <div class="detail-label">User ID</div>
                <div class="detail-value" th:text="${user.id}">1</div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Username</div>
                <div class="detail-value" th:text="${user.username}">admin</div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Email</div>
                <div class="detail-value" th:text="${user.email}">admin@test.com</div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Phone</div>
                <div class="detail-value" th:text="${user.phone ?: 'Not provided'}">1234567890</div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Role</div>
                <div class="detail-value">
                        <span class="badge"
                              th:classappend="${user.role.name() == 'ADMIN' ? 'badge-info' :
                                             (user.role.name() == 'MANAGER' ? 'badge-warning' : 'badge-success')}"
                              th:text="${user.role}">ADMIN</span>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Status</div>
                <div class="detail-value">
                        <span class="badge"
                              th:classappend="${user.enabled} ? 'badge-success' : 'badge-danger'"
                              th:text="${user.enabled} ? 'ENABLED' : 'DISABLED'">ENABLED</span>
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Created</div>
                <div class="detail-value" th:text="${#temporals.format(user.createdAt, 'dd MMM yyyy HH:mm')}">
                    2024-01-01 10:30
                </div>
            </div>

            <div class="detail-row">
                <div class="detail-label">Last Updated</div>
                <div class="detail-value" th:text="${#temporals.format(user.updatedAt, 'dd MMM yyyy HH:mm')}">
                    2024-01-01 10:30
                </div>
            </div>
        </div>

        <div class="btn-group">
            <a th:href="@{/users/edit/{id}(id=${user.id})}" class="btn btn-primary">
                <i class="fas fa-edit"></i> Edit User
            </a>
            <a th:href="@{/users/toggle/{id}(id=${user.id})}"
               class="btn btn-warning"
               th:text="${user.enabled} ? 'Disable User' : 'Enable User'">
                <i class="fas" th:classappend="${user.enabled} ? 'fa-ban' : 'fa-check'"></i>
                <span th:text="${user.enabled} ? 'Disable User' : 'Enable User'"></span>
            </a>
            <a href="/users" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>
    </div>

    <div class="back-link">
        <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
</div>
</body>
</html>
