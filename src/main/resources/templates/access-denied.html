<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Access Denied</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">

    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .access-container {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: var(--spacing-8);
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: var(--shadow-xl);
        }
        .icon {
            font-size: 4rem;
            color: var(--danger);
            margin-bottom: var(--spacing-4);
        }
    </style>
</head>
<body>
<div class="access-container">
    <div class="icon"><i class="fas fa-ban"></i></div>
    <h1 style="color: var(--danger);">403</h1>
    <h2>Access Denied</h2>
    <p style="color: var(--gray-500); margin: var(--spacing-4) 0;">You don't have permission to access this page. Please contact your administrator.</p>
    <div style="display: flex; gap: var(--spacing-3); justify-content: center;">
        <a href="/dashboard" class="btn btn-primary"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/logout" class="btn btn-secondary"><i class="fas fa-sign-out-alt"></i> Logout</a>
    </div>
</div>
</body>
</html>
