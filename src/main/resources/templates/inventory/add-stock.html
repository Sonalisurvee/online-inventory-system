<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Add Stock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: #48bb78;
            color: white;
        }

        .btn-primary:hover {
            background: #38a169;
        }

        .btn-secondary {
            background: #a0aec0;
            color: white;
        }

        .btn-secondary:hover {
            background: #718096;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .info-text {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1 th:text="${title}">Add Stock</h1>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}">
        Error message
    </div>

    <!-- Form -->
    <div class="form-container">
        <form th:action="@{/inventory/add-stock}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="form-group">
                <label>Select Product</label>
                <select name="productId" required>
                    <option value="">-- Choose Product --</option>
                    <option th:each="product : ${products}"
                            th:value="${product.id}"
                            th:text="${product.name} + ' (₹' + ${product.unitPrice} + ')'"
                            th:selected="${preselectedProductId != null and product.id == preselectedProductId}">
                        Product Name
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Select Store</label>
                <select name="storeId" required>
                    <option value="">-- Choose Store --</option>
                    <option th:each="store : ${stores}"
                            th:value="${store.id}"
                            th:text="${store.name} + ' - ' + ${store.location}"
                            th:selected="${preselectedStoreId != null and store.id == preselectedStoreId}">
                        Store Name
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label>Quantity to Add</label>
                <input type="number" name="quantity" min="1" required
                       placeholder="Enter quantity">
                <div class="info-text">Enter positive number only</div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">➕ Add Stock</button>
                <a href="javascript:history.back()" class="btn btn-secondary">↩ Cancel</a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="javascript:history.back()">← Go Back</a> |
        <a href="/inventory/low-stock">View Low Stock</a> |
        <a href="/inventory/store">Stores</a>
    </div>
</div>
</body>
</html>
