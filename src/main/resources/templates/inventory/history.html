<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Stock History</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">

    <style>
        .info-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .info-item {
            text-align: center;
        }
        .info-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .info-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-top: 8px;
        }
        .badge-purchase { background: #d1fae5; color: #065f46; }
        .badge-sale { background: #fee2e2; color: #991b1b; }
        .badge-transfer { background: #dbeafe; color: #1e40af; }
        .quantity-positive { color: #10b981; font-weight: 600; }
        .quantity-negative { color: #ef4444; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-history"></i>
                <h1 th:text="${title}">Stock History</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <form th:action="@{/logout}" method="post" style="display: inline;">
                    <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Product & Store Info -->
    <div class="info-card">
        <div class="info-item">
            <div class="info-label"><i class="fas fa-box"></i> Product</div>
            <div class="info-value" th:text="${inventory.product.name}">iPhone 15</div>
        </div>
        <div class="info-item">
            <div class="info-label"><i class="fas fa-store"></i> Store</div>
            <div class="info-value" th:text="${inventory.store.name}">Main Store</div>
        </div>
        <div class="info-item">
            <div class="info-label"><i class="fas fa-chart-line"></i> Current Stock</div>
            <div class="info-value" th:text="${inventory.quantity}">10</div>
        </div>
        <div class="info-item">
            <div class="info-label"><i class="fas fa-chart-line"></i> Min / Max</div>
            <div class="info-value" th:text="${inventory.minQuantity} + ' / ' + ${inventory.maxQuantity}">5 / 50</div>
        </div>
    </div>

    <!-- Movements Table -->
    <div class="table-responsive">
        <div class="table-container">
            <table>
                <thead>
                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Quantity</th>
                    <th>Reference</th>
                    <th>Details</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="mov : ${movements}">
                    <td th:text="${#temporals.format(mov.dateTime, 'dd MMM yyyy HH:mm')}">19 Mar 2025 10:30</td>
                    <td>
                                <span class="badge"
                                      th:classappend="${mov.type == 'PURCHASE'} ? 'badge-purchase' :
                                                      (${mov.type == 'SALE'} ? 'badge-sale' : 'badge-transfer')"
                                      th:text="${mov.type}">PURCHASE</span>
                    </td>
                    <td>
                                <span th:classappend="${mov.quantity > 0} ? 'quantity-positive' : 'quantity-negative'"
                                      th:text="${mov.quantity > 0} ? '+' + ${mov.quantity} : ${mov.quantity}">+10</span>
                    </td>
                    <td th:text="${mov.reference}">PO-001</td>
                    <td th:text="${mov.notes}">Supplier: ABC Corp</td>
                </tr>
                <tr th:if="${movements.isEmpty()}">
                    <td colspan="5" class="empty-state">
                        <div class="icon"><i class="fas fa-box-open"></i></div>
                        No purchases or sales found for this product in this store.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="back-link">
        <a th:href="@{/stock/view/{id}(id=${inventory.store.id})}"><i class="fas fa-arrow-left"></i> Back to Inventory</a>
    </div>
</div>
</body>
</html>
