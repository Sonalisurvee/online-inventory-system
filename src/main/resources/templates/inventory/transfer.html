<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${title}">Transfer Stock</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        padding: 20px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
    }

    .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    .header h1 {
        color: #333;
        font-size: 24px;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: #4a5568;
        font-weight: 500;
    }

    select, input {
        width: 100%;
        padding: 12px;
        border: 2px solid #e2e8f0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    select:focus, input:focus {
        outline: none;
        border-color: #4299e1;
    }

    .transfer-icon {
        text-align: center;
        margin: 10px 0;
        font-size: 24px;
        color: #4299e1;
    }

    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
        flex: 1;
        text-align: center;
    }

    .btn-primary {
        background: #4299e1;
        color: white;
    }

    .btn-primary:hover {
        background: #3182ce;
    }

    .btn-secondary {
        background: #a0aec0;
        color: white;
    }

    .btn-secondary:hover {
        background: #718096;
    }

    .alert {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .info-text {
        font-size: 12px;
        color: #718096;
        margin-top: 5px;
    }

    .store-group {
        background: #f7fafc;
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 15px;
    }

    .back-link {
        margin-top: 20px;
        text-align: center;
    }

    .back-link a {
        color: #667eea;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 th:text="${title}">Transfer Stock</h1>
  </div>

  <!-- Show which product/store we're transferring from -->
  <div th:if="${preselectedProductId != null and preselectedFromStoreId != null}"
       style="background: #e6f7ff; padding: 15px; border-radius: 5px; margin-bottom: 20px; border-left: 4px solid #1890ff;">
    <strong>Transferring from:</strong><br>
    Product: <span th:text="${preselectedProductId}"></span><br>
    From Store: <span th:text="${preselectedFromStoreId}"></span>
  </div>

  <div class="form-container">
    <form th:action="@{/inventory/transfer}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

      <div class="form-group">
        <label>Select Product</label>
        <select name="productId" required>
          <option value="">-- Choose Product --</option>
          <option th:each="product : ${products}"
                  th:value="${product.id}"
                  th:text="${product.name} + ' (₹' + ${product.unitPrice} + ')'"
                  th:selected="${preselectedProductId != null and product.id == preselectedProductId}">
            Product Name
          </option>
        </select>
      </div>

      <div class="store-group">
        <div class="form-group">
          <label>From Store (Source)</label>
          <select name="fromStoreId" required>
            <option value="">-- Choose Source Store --</option>
            <option th:each="store : ${stores}"
                    th:value="${store.id}"
                    th:text="${store.name} + ' - ' + ${store.location}"
                    th:selected="${preselectedFromStoreId != null and store.id == preselectedFromStoreId}">
              Store Name
            </option>
          </select>
        </div>

        <div class="transfer-icon">↓ TRANSFER ↓</div>

        <div class="form-group">
          <label>To Store (Destination)</label>
          <select name="toStoreId" required>
            <option value="">-- Choose Destination Store --</option>
            <option th:each="store : ${stores}"
                    th:value="${store.id}"
                    th:text="${store.name} + ' - ' + ${store.location}">
              Store Name
            </option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Quantity to Transfer</label>
        <input type="number" name="quantity" min="1" required
               placeholder="Enter quantity">
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-primary">🔄 Transfer Stock</button>
        <a href="javascript:history.back()" class="btn btn-secondary">↩ Cancel</a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="javascript:history.back()">← Go Back</a> |
    <a href="/inventory/low-stock">Low Stock</a> |
    <a href="/inventory/store">All Stores</a>
  </div>
</div>
</body>
</html>
