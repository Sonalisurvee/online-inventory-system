<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove Stock - Inventory System</title>
  <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        padding: 20px;
    }

    .container {
        max-width: 600px;
        margin: 0 auto;
    }

    .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 15px;
    }

    .header h1 {
        color: #1e293b;
        font-size: 24px;
    }

    .back-btn {
        padding: 8px 15px;
        background: #f1f5f9;
        color: #334155;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }

    .back-btn:hover {
        background: #e2e8f0;
    }

    .form-card {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 25px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        color: #334155;
        font-weight: 500;
        font-size: 14px;
    }

    select, input {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #e2e8f0;
        border-radius: 8px;
        font-size: 15px;
        transition: all 0.3s;
        background: white;
    }

    select:focus, input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .alert {
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 20px;
    }

    .alert-error {
        background: #fee2e2;
        color: #991b1b;
        border: 1px solid #fecaca;
    }

    .alert-success {
        background: #d1fae5;
        color: #065f46;
        border: 1px solid #a7f3d0;
    }

    .alert-warning {
        background: #fef3c7;
        color: #92400e;
        border: 1px solid #fde68a;
    }

    .btn-group {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }

    .btn {
        padding: 12px 25px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: all 0.3s;
        flex: 1;
    }

    .btn-danger {
        background: #ef4444;
        color: white;
    }

    .btn-danger:hover {
        background: #dc2626;
        transform: translateY(-2px);
    }

    .btn-secondary {
        background: #f1f5f9;
        color: #334155;
    }

    .btn-secondary:hover {
        background: #e2e8f0;
    }

    .current-stock {
        background: #f8fafc;
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .stock-label {
        color: #64748b;
        font-size: 14px;
    }

    .stock-value {
        font-size: 24px;
        font-weight: bold;
        color: #1e293b;
    }

    .warning-text {
        color: #ef4444;
        font-size: 13px;
        margin-top: 5px;
    }
  </style>
</head>
<body>
<div class="container">
  <!-- Header with Back Button -->
  <div class="header">
    <a href="javascript:history.back()" class="back-btn">← Back</a>
    <h1>➖ Remove Stock</h1>
  </div>

  <!-- Error/Success Messages -->
  <div th:if="${error}" class="alert alert-error" th:text="${error}">
    Error message
  </div>

  <div th:if="${success}" class="alert alert-success" th:text="${success}">
    Success message
  </div>

  <!-- Remove Stock Form -->
  <div class="form-card">
    <form th:action="@{/stock/remove}" method="post" id="removeStockForm">
      <!-- Store Selection -->
      <div class="form-group">
        <label class="required">Select Store</label>
        <select name="storeId" id="storeSelect" required>
          <option value="">-- Choose a Store --</option>
          <option th:each="store : ${stores}"
                  th:value="${store.id}"
                  th:text="${store.name} + ' - ' + ${store.location}"
                  th:selected="${store.id == selectedStoreId}">
            Main Store - Delhi
          </option>
        </select>
      </div>

      <!-- Product Selection -->
      <div class="form-group">
        <label class="required">Select Product</label>
        <select name="productId" id="productSelect" required>
          <option value="">-- Choose a Product --</option>
          <option th:each="product : ${products}"
                  th:value="${product.id}"
                  th:text="${product.name} + ' (₹' + ${#numbers.formatDecimal(product.unitPrice, 1, 2)} + ')'"
                  th:selected="${product.id == selectedProductId}">
            iPhone 15 (₹79,999)
          </option>
        </select>
      </div>

      <!-- Current Stock Display (will be updated via JS) -->
      <div class="current-stock" id="currentStockDiv" style="display: none;">
        <span class="stock-label">Current Stock:</span>
        <span class="stock-value" id="currentStock">0</span>
      </div>

      <!-- Quantity Input -->
      <div class="form-group">
        <label class="required">Quantity to Remove</label>
        <input type="number" name="quantity" id="quantity"
               min="1" step="1" value="1" required
               placeholder="Enter quantity">
        <div class="warning-text" id="warningMessage"></div>
      </div>

      <!-- Action Buttons -->
      <div class="btn-group">
        <button type="submit" class="btn btn-danger">✅ Remove from Stock</button>
        <a href="/dashboard" class="btn btn-secondary">↩ Cancel</a>
      </div>
    </form>
  </div>

  <!-- Quick Tips -->
  <div style="background: #f8fafc; border-radius: 8px; padding: 15px; margin-top: 20px;">
    <h3 style="color: #1e293b; font-size: 16px; margin-bottom: 10px;">📌 Important:</h3>
    <ul style="color: #64748b; font-size: 14px; margin-left: 20px;">
      <li>You cannot remove more than the current stock</li>
      <li>Use this for sales, damaged items, or returns to supplier</li>
      <li>For transferring between stores, use the Transfer option</li>
    </ul>
  </div>
</div>

<script>
  // This would need AJAX to get current stock
  // For now, we'll just show/hide based on selections
  document.getElementById('productSelect').addEventListener('change', function() {
      var storeSelect = document.getElementById('storeSelect');
      var currentStockDiv = document.getElementById('currentStockDiv');

      if (this.value && storeSelect.value) {
          currentStockDiv.style.display = 'flex';
          // In real app, you'd fetch current stock here
          document.getElementById('currentStock').textContent = 'Check database';
      } else {
          currentStockDiv.style.display = 'none';
      }
  });

  document.getElementById('storeSelect').addEventListener('change', function() {
      var productSelect = document.getElementById('productSelect');
      var currentStockDiv = document.getElementById('currentStockDiv');

      if (this.value && productSelect.value) {
          currentStockDiv.style.display = 'flex';
          document.getElementById('currentStock').textContent = 'Check database';
      } else {
          currentStockDiv.style.display = 'none';
      }
  });

  // Quantity validation
  document.getElementById('quantity').addEventListener('input', function() {
      if (this.value < 1) {
          this.value = 1;
      }
  });
</script>
</body>
</html>
