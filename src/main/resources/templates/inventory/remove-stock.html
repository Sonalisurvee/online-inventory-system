<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Remove Stock - Inventory System</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .current-stock {
        background: var(--gray-50);
        border-radius: var(--radius);
        padding: var(--spacing-4);
        margin-bottom: var(--spacing-5);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-left: 4px solid var(--primary);
    }
    .warning-text {
        color: var(--danger);
        font-size: 0.75rem;
        margin-top: var(--spacing-1);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-minus-circle"></i>
        <h1>Remove Stock</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Error/Success Messages -->
  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>
  <div th:if="${success}" class="alert alert-success">
    <i class="fas fa-check-circle"></i> <span th:text="${success}">Success</span>
  </div>

  <!-- Remove Stock Form -->
  <div class="form-container">
    <form th:action="@{/stock/remove}" method="post" id="removeStockForm">
      <div class="form-group">
        <label class="required"><i class="fas fa-store"></i> Select Store</label>
        <select name="storeId" id="storeSelect" required>
          <option value="">-- Choose a Store --</option>
          <option th:each="store : ${stores}"
                  th:value="${store.id}"
                  th:text="${store.name} + ' - ' + ${store.location}"
                  th:selected="${store.id == selectedStoreId}">
          </option>
        </select>
      </div>

      <div class="form-group">
        <label class="required"><i class="fas fa-box"></i> Select Product</label>
        <select name="productId" id="productSelect" required>
          <option value="">-- Choose a Product --</option>
          <option th:each="product : ${products}"
                  th:value="${product.id}"
                  th:text="${product.name} + ' (₹' + ${#numbers.formatDecimal(product.unitPrice, 1, 2)} + ')'"
                  th:selected="${product.id == selectedProductId}">
          </option>
        </select>
      </div>

      <div class="current-stock" id="currentStockDiv" style="display: none;">
        <span><i class="fas fa-chart-line"></i> Current Stock:</span>
        <strong id="currentStock" style="font-size: 1.25rem;">0</strong>
      </div>

      <div class="form-group">
        <label class="required"><i class="fas fa-minus"></i> Quantity to Remove</label>
        <input type="number" name="quantity" id="quantity" min="1" step="1" value="1" required>
        <div class="warning-text" id="warningMessage"></div>
      </div>

      <div class="btn-group" style="display: flex; gap: var(--spacing-3); margin-top: var(--spacing-6);">
        <button type="submit" class="btn btn-danger"><i class="fas fa-check"></i> Remove from Stock</button>
        <a href="/dashboard" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>

  <!-- Quick Tips -->
  <div style="background: var(--gray-50); border-radius: var(--radius); padding: var(--spacing-4); margin-top: var(--spacing-5);">
    <h3 style="font-size: 1rem; margin-bottom: var(--spacing-2);"><i class="fas fa-lightbulb"></i> Important:</h3>
    <ul style="margin-left: var(--spacing-5); color: var(--gray-600);">
      <li>You cannot remove more than the current stock</li>
      <li>Use this for sales, damaged items, or returns to supplier</li>
      <li>For transferring between stores, use the Transfer option</li>
    </ul>
  </div>

  <div class="back-link">
    <a href="javascript:history.back()"><i class="fas fa-arrow-left"></i> Back</a>
  </div>
</div>

<script>
  const productSelect = document.getElementById('productSelect');
  const storeSelect = document.getElementById('storeSelect');
  const currentStockDiv = document.getElementById('currentStockDiv');
  const currentStockSpan = document.getElementById('currentStock');
  const quantityInput = document.getElementById('quantity');
  const warningMsg = document.getElementById('warningMessage');

  async function fetchCurrentStock() {
      const productId = productSelect.value;
      const storeId = storeSelect.value;

      if (!productId || !storeId) {
          currentStockDiv.style.display = 'none';
          return;
      }

      currentStockSpan.textContent = 'Loading...';
      currentStockDiv.style.display = 'flex';

      try {
          const response = await fetch(`/stock/api/stock?productId=${productId}&storeId=${storeId}`);
          if (response.ok) {
              const stock = await response.text();
              currentStockSpan.textContent = stock;
              checkQuantity(parseInt(stock));
          } else {
              currentStockSpan.textContent = 'Error';
          }
      } catch (error) {
          currentStockSpan.textContent = 'Error';
          console.error('Failed to fetch stock:', error);
      }
  }

  function checkQuantity(currentStock) {
      const quantity = parseInt(quantityInput.value) || 0;
      if (quantity > currentStock) {
          warningMsg.textContent = `Warning: You cannot remove more than ${currentStock} units!`;
      } else {
          warningMsg.textContent = '';
      }
  }

  productSelect.addEventListener('change', fetchCurrentStock);
  storeSelect.addEventListener('change', fetchCurrentStock);
  quantityInput.addEventListener('input', function() {
      if (this.value < 1) this.value = 1;
      const currentStock = parseInt(currentStockSpan.textContent);
      if (!isNaN(currentStock)) checkQuantity(currentStock);
  });

  window.addEventListener('load', function() {
      if (productSelect.value && storeSelect.value) fetchCurrentStock();
  });
</script>
</body>
</html>
