<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Product Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-header p {
        opacity: 0.8;
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 150px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .price {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--success-dark);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-box"></i>
        <h1 th:text="${title}">Product Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <h2 th:text="${product.name}">Product Name</h2>
      <p>Product ID: <span th:text="${product.id}">1</span></p>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Image</div>
        <div class="detail-value">
          <img th:if="${product.imagePath != null}"
               th:src="@{/uploads/{path}(path=${product.imagePath})}"
               style="max-width: 200px; border-radius: var(--radius);">
          <span th:unless="${product.imagePath != null}">No image</span>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Description</div>
        <div class="detail-value" th:text="${product.description ?: 'No description provided'}">
          Description here
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Category</div>
        <div class="detail-value" th:text="${product.category?.name ?: 'Uncategorized'}">
          Electronics
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Unit Price</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(product.unitPrice, 1, 2)}">
          ₹99.99
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Reorder Level</div>
        <div class="detail-value" th:text="${product.reorderLevel ?: 'Not set'}">
          10
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Expiry Date</div>
        <div class="detail-value" th:text="${product.expiryDate ?: 'No expiry'}">
          2025-12-31
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Status</div>
        <div class="detail-value">
                        <span class="badge"
                              th:classappend="${product.status == 'ACTIVE'} ? 'badge-success' : 'badge-danger'"
                              th:text="${product.status}">ACTIVE</span>
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Created</div>
        <div class="detail-value" th:text="${#temporals.format(product.createdAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>

      <div class="detail-row">
        <div class="detail-label">Last Updated</div>
        <div class="detail-value" th:text="${#temporals.format(product.updatedAt, 'dd MMM yyyy HH:mm')}">
          2024-01-01 10:30
        </div>
      </div>
    </div>

    <div class="btn-group">
      <a th:href="@{/products/edit/{id}(id=${product.id})}" class="btn btn-edit">
        <i class="fas fa-edit"></i> Edit Product
      </a>
      <a href="/products" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to List
      </a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
