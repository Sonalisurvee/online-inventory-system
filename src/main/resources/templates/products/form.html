<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Product Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .header h1 {
            color: #333;
            font-size: 24px;
        }

        .form-container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            flex: 1;
            margin-bottom: 20px;
        }

        .form-group.half {
            flex: 1;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #4a5568;
            font-weight: 500;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5a67d8;
        }

        .btn-secondary {
            background: #a0aec0;
            color: white;
        }

        .btn-secondary:hover {
            background: #718096;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-error {
            background: #fed7d7;
            color: #742a2a;
            border: 1px solid #fc8181;
        }

        .required:after {
            content: " *";
            color: #f56565;
        }

        .info-text {
            font-size: 12px;
            color: #718096;
            margin-top: 5px;
        }

        .back-link {
            margin-top: 20px;
            text-align: center;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
        }

        .back-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Header -->
    <div class="header">
        <h1 th:text="${title}">Add New Product</h1>
    </div>

    <!-- Error Message -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}">
        Error message
    </div>

    <!-- Form -->
    <div class="form-container">
        <form th:action="@{/products/save}" method="post" th:object="${product}" enctype="multipart/form-data">
            <!-- Hidden ID field for edit -->
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Product Name</label>
                <input type="text" th:field="*{name}" required
                       placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}"
                          placeholder="Enter product description (optional)"></textarea>
            </div>

            <!-- Image Upload Field -->
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="imageFile" accept="image/*" id="imageInput">
                <div class="info-text">Upload a product image (JPG, PNG, max 10MB)</div>
                <!-- Show current image if exists -->
                <div th:if="${product.imagePath != null}" style="margin-top: 10px;">
                    <img th:src="@{/uploads/{path}(path=${product.imagePath})}"
                         style="max-width: 200px; max-height: 200px;" alt="Product image">
                    <br>
                    <small>Current image (replace with new upload)</small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label class="required">Category</label>
                    <select name="category.id" required>
                        <option value="">Select Category</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                        </option>
                    </select>
                </div>

                <div class="form-group half">
                    <label class="required">Unit Price (₹)</label>
                    <input type="number" step="0.01" min="0" name="unitPrice"
                           th:value="*{unitPrice}" required
                           placeholder="0.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group half">
                    <label>Reorder Level</label>
                    <input type="number" min="0" name="reorderLevel"
                           th:value="*{reorderLevel ?: 10}"
                           placeholder="10">
                    <div class="info-text">Minimum stock before reorder alert</div>
                </div>

                <div class="form-group half">
                    <label>Expiry Date</label>
                    <input type="date" name="expiryDate"
                           th:value="*{expiryDate}">
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">💾 Save Product</button>
                <a href="/products" class="btn btn-secondary">↩ Cancel</a>
            </div>
        </form>
    </div>

    <!-- Back to Products List -->
    <div class="back-link">
        <a href="/products">← Back to Products</a>
    </div>
</div>
</body>
</html>
