<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title th:text="${title}">Product Form</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/components.css">
</head>
<body>
<div class="container">
    <div class="main-header">
        <div class="header-bar">
            <div class="header-title">
                <i class="fas fa-box"></i>
                <h1 th:text="${title}">Product Form</h1>
            </div>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span th:text="${#authentication.name}">admin</span>
                <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </div>
        </div>
    </div>

    <div th:if="${error}" class="alert alert-error">
        <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
    </div>

    <div class="form-container">
        <form th:action="@{/products/save}" method="post" th:object="${product}" enctype="multipart/form-data">
            <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

            <div class="form-group">
                <label class="required">Product Name</label>
                <input type="text" th:field="*{name}" required placeholder="Enter product name">
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea th:field="*{description}" placeholder="Enter product description (optional)"></textarea>
            </div>

            <!-- Image Upload Field -->
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="imageFile" accept="image/*" id="imageInput">
                <small class="info-text"><i class="fas fa-info-circle"></i> Upload a product image (JPG, PNG, max 10MB)</small>
                <div th:if="${product.imagePath != null}" style="margin-top: 10px;">
                    <img th:src="@{/uploads/{path}(path=${product.imagePath})}"
                         style="max-width: 150px; max-height: 150px; border-radius: var(--radius);">
                    <br><small>Current image (replace with new upload)</small>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="required">Category</label>
                    <select name="category.id" required>
                        <option value="">Select Category</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${product.category != null and product.category.id == cat.id}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="required">Unit Price (₹)</label>
                    <input type="number" step="0.01" min="0" name="unitPrice"
                           th:value="*{unitPrice}" required placeholder="0.00">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Reorder Level</label>
                    <input type="number" min="0" name="reorderLevel"
                           th:value="*{reorderLevel ?: 10}" placeholder="10">
                    <small class="info-text">Minimum stock before reorder alert</small>
                </div>

                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" name="expiryDate" th:value="*{expiryDate}">
                </div>
            </div>

            <div class="btn-group" style="display: flex; gap: 15px; margin-top: 30px;">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Product
                </button>
                <a href="/products" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancel
                </a>
            </div>
        </form>
    </div>

    <div class="back-link">
        <a href="/products"><i class="fas fa-arrow-left"></i> Back to Products</a>
    </div>
</div>
</body>
</html>
