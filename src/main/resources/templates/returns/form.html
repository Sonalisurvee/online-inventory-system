<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">New Return</title>

  <style>
    /* Keep your existing styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    .header h1 {
        color: #333;
        font-size: 24px;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row .form-group {
        flex: 1;
        margin-bottom: 0;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: #4a5568;
        font-weight: 500;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #e2e8f0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #667eea;
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
        flex: 1;
        text-align: center;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover {
        background: #5a67d8;
    }

    .btn-secondary {
        background: #a0aec0;
        color: white;
    }

    .btn-secondary:hover {
        background: #718096;
    }

    .alert {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .required:after {
        content: " *";
        color: #f56565;
    }

    .info-text {
        font-size: 12px;
        color: #718096;
        margin-top: 5px;
    }

    .back-link {
        margin-top: 20px;
        text-align: center;
    }

    .back-link a {
        color: #667eea;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
  </style>
   </head>
  <body>
  <div class="container">
    <div class="header">
      <h1 th:text="${title}">New Return</h1>
      <a href="javascript:history.back()" class="back-btn">← Back</a>
    </div>
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>
    <div class="form-card">
      <form th:action="@{/returns/save}" method="post" th:object="${returnObj}">
        <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

        <!-- Return Number (auto-generated, readonly) -->
        <div class="form-group">
          <label>Return Number</label>
          <input type="text" th:field="*{returnNo}" readonly class="readonly">
        </div>

        <!-- Search input above the dropdown -->
        <input type="text" id="searchSale" placeholder="Search by invoice, product, or store..."
               onkeyup="filterSaleOptions()" style="width:100%; padding:8px; margin-bottom:8px;">

        <select name="saleId" id="saleSelect" required>
          <option value="">-- Select Sale --</option>
          <option th:each="sale : ${sales}"
                  th:value="${sale.id}"
                  th:text="${sale.invoiceNo} + ' - ' + ${sale.saleDate} + ' (' + ${sale.store.name} + ') - ' + ${sale.product.name} + ' (Qty: ' + ${sale.quantity} + ')'">
          </option>
        </select>

        <!-- Quantity -->
        <div class="form-group">
          <label>Quantity to Return *</label>
          <input type="number" th:field="*{quantity}" min="1" step="1" required>
        </div>

        <!-- Reason -->
        <div class="form-group">
          <label>Reason</label>
          <textarea th:field="*{reason}" rows="3" placeholder="e.g., Damaged, Wrong size, etc."></textarea>
        </div>

        <!-- Return Date -->
        <div class="form-group">
          <label>Return Date</label>
          <input type="date" th:field="*{returnDate}">
        </div>

        <div class="btn-group">
          <button type="submit" class="btn btn-primary">Record Return</button>
          <a href="/returns" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    function filterSales() {
        var input = document.getElementById('searchSale');
        var filter = input.value.toUpperCase();
        var select = document.getElementById('saleSelect');
        var options = select.options;
        for (var i = 0; i < options.length; i++) {
            var txt = options[i].textContent.toUpperCase();
            options[i].style.display = txt.includes(filter) ? '' : 'none';
        }
    }
  </script>
  </body>
  </html>
