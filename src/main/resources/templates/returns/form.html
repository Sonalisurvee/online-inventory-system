<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">New Return</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .sale-search {
        position: relative;
        margin-bottom: var(--spacing-3);
    }
    .sale-search input {
        width: 100%;
        padding: 0.5rem;
        border: 1px solid var(--gray-300);
        border-radius: var(--radius);
    }
    select {
        max-height: 200px;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-undo-alt"></i>
        <h1 th:text="${title}">New Return</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <div class="form-container">
    <form th:action="@{/returns/save}" method="post" th:object="${returnObj}">
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <div class="form-group">
        <label><i class="fas fa-receipt"></i> Return Number</label>
        <input type="text" th:field="*{returnNo}" readonly class="readonly" style="background: var(--gray-100);">
      </div>

      <div class="form-group">
        <label><i class="fas fa-shopping-cart"></i> Original Sale (Optional)</label>
        <div class="sale-search">
          <input type="text" id="saleSearch" placeholder="Search by invoice number or product..." onkeyup="filterSales()">
        </div>
        <select name="saleId" id="saleSelect" style="min-height: 120px;">
          <option value="">-- Not linked to a sale --</option>
          <option th:each="sale : ${sales}"
                  th:value="${sale.id}"
                  th:text="${sale.invoiceNo} + ' - ' + ${#temporals.format(sale.saleDate, 'dd MMM yyyy')} + ' (' + ${sale.store.name} + ') - ' + ${sale.product.name} + ' (Qty: ' + ${sale.quantity} + ')'">
          </option>
        </select>
        <small class="info-text">Select the original sale if this return is linked to a previous purchase</small>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-store"></i> Store</label>
          <select name="storeId" required>
            <option value="">-- Select Store --</option>
            <option th:each="s : ${stores}" th:value="${s.id}" th:text="${s.name}"></option>
          </select>
        </div>

        <div class="form-group">
          <label class="required"><i class="fas fa-box"></i> Product</label>
          <select name="productId" required>
            <option value="">-- Select Product --</option>
            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name}"></option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-hashtag"></i> Quantity to Return</label>
          <input type="number" th:field="*{quantity}" min="1" step="1" required>
        </div>

        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Return Date</label>
          <input type="date" th:field="*{returnDate}">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-comment"></i> Reason for Return</label>
        <textarea th:field="*{reason}" rows="3" placeholder="e.g., Damaged, Wrong size, Expired, etc."></textarea>
      </div>

      <div class="btn-group" style="display: flex; gap: var(--spacing-3); margin-top: var(--spacing-6);">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Record Return</button>
        <a href="/returns" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="/returns"><i class="fas fa-arrow-left"></i> Back to Returns</a>
  </div>
</div>

<script>
  function filterSales() {
      var input = document.getElementById('saleSearch');
      var filter = input.value.toUpperCase();
      var select = document.getElementById('saleSelect');
      var options = select.options;

      for (var i = 0; i < options.length; i++) {
          var txt = options[i].textContent.toUpperCase();
          if (txt.includes(filter)) {
              options[i].style.display = '';
          } else {
              options[i].style.display = 'none';
          }
      }
  }
</script>
</body>
</html>
