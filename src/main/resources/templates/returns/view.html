<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Return Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--warning) 0%, var(--warning-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 140px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-undo-alt"></i>
        <h1 th:text="${title}">Return Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <h2><i class="fas fa-undo-alt"></i> Return: <span th:text="${returnObj.returnNo}">RET001</span></h2>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value" th:text="${#temporals.format(returnObj.returnDate, 'dd MMM yyyy')}">2025-03-19</div>
      </div>
      <div class="detail-row" th:if="${returnObj.sale != null}">
        <div class="detail-label">Original Sale</div>
        <div class="detail-value" th:text="${returnObj.sale.invoiceNo}">SALE001</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Store</div>
        <div class="detail-value" th:text="${returnObj.store.name}">Store</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Product</div>
        <div class="detail-value" th:text="${returnObj.product.name}">Product</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Quantity</div>
        <div class="detail-value" th:text="${returnObj.quantity}">1</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Reason</div>
        <div class="detail-value" th:text="${returnObj.reason ?: 'N/A'}">Damaged</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Processed By</div>
        <div class="detail-value" th:text="${returnObj.user.username}">admin</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Processed At</div>
        <div class="detail-value" th:text="${#temporals.format(returnObj.createdAt, 'dd MMM yyyy HH:mm')}">2025-03-19 10:30</div>
      </div>
    </div>

    <div class="btn-group">
      <a href="/returns" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to List</a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
