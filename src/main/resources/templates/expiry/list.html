<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">Expiry Alerts</title>
  <style>
    /* reuse your existing styles, or add new ones */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f0f2f5;
        padding: 20px;
    }
    .container {
        max-width: 1200px;
        margin: 0 auto;
    }
    .header {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .header h1 {
        color: #1e293b;
        font-size: 24px;
    }
    .back-btn {
        padding: 8px 15px;
        background: #f1f5f9;
        color: #334155;
        text-decoration: none;
        border-radius: 6px;
        font-size: 14px;
    }
    .filter-bar {
        background: white;
        padding: 15px 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        display: flex;
        gap: 15px;
        align-items: center;
        flex-wrap: wrap;
    }
    .filter-bar form {
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }
    .filter-bar select {
        padding: 8px 12px;
        border: 2px solid #e2e8f0;
        border-radius: 6px;
    }
    .filter-bar button {
        padding: 8px 16px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    .table-container {
        background: white;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th {
        background: #f8fafc;
        padding: 12px;
        text-align: left;
        color: #475569;
        border-bottom: 2px solid #e2e8f0;
    }
    td {
        padding: 12px;
        border-bottom: 1px solid #e2e8f0;
        color: #334155;
    }
    .badge-warning {
        background: #fef3c7;
        color: #92400e;
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }
    .badge-danger {
        background: #fee2e2;
        color: #991b1b;
        padding: 4px 8px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
    }
    .empty-state {
        text-align: center;
        padding: 50px;
        color: #94a3b8;
    }
    .back-link {
        margin-top: 20px;
        text-align: center;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>⚠️ Expiry Alerts</h1>
    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
  </div>

  <div class="filter-bar">
    <form method="get" action="/expiry">
      <label for="days">Show products expiring within:</label>
      <select name="days" id="days">
        <option value="7" th:selected="${days == 7}">7 days</option>
        <option value="15" th:selected="${days == 15}">15 days</option>
        <option value="30" th:selected="${days == 30}">30 days</option>
        <option value="60" th:selected="${days == 60}">60 days</option>
      </select>
      <button type="submit">Apply</button>
    </form>
  </div>

  <div class="table-container">
    <table>
      <thead>
      <tr>
        <th>Product</th>
        <th>Category</th>
        <th>Store(s)</th>
        <th>Expiry Date</th>
        <th>Days Left</th>
        <th>Stock Status</th>
      </tr>
      </thead>


      <tbody>
      <tr th:each="product, stat : ${products}">
        <td th:text="${product.name}">Milk</td>
        <td th:text="${product.category.name}">Groceries</td>
        <td>
            <span th:each="inv : ${product.inventory}"
                  th:text="${inv.store.name + ' (' + inv.quantity + ')'}"
                  th:unless="${inv.quantity == 0}"></span>
          <span th:if="${product.inventory.isEmpty()}">No stock</span>
        </td>
        <td th:text="${#temporals.format(product.expiryDate, 'dd MMM yyyy')}">2025-04-15</td>
        <td>
            <span th:with="daysLeft=${daysLeftList[stat.index]}"
                  th:text="${daysLeft != null ? daysLeft + ' days' : 'N/A'}">
                30 days
            </span>
        </td>
        <td>
            <span th:with="daysLeft=${daysLeftList[stat.index]}">
                <span th:if="${daysLeft != null and daysLeft < 0}" class="badge-danger">Expired</span>
                <span th:if="${daysLeft != null and daysLeft >= 0 and daysLeft <= 7}" class="badge-warning">⚠️ Urgent</span>
                <span th:if="${daysLeft != null and daysLeft > 7}" class="badge">Normal</span>
                <span th:if="${daysLeft == null}" class="badge">No expiry</span>
            </span>
        </td>
      </tr>
      <tr th:if="${products.isEmpty()}">
        <td colspan="6" class="empty-state">
          ✅ No products expiring within <span th:text="${days}"></span> days.
        </td>
      </tr>
      </tbody>


    </table>
  </div>

  <div class="back-link">
    <a href="/dashboard">← Back to Dashboard</a>
  </div>
</div>
</body>
</html>
