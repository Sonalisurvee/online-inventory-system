<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Error - Inventory System</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">

  <style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
    }
    .error-container {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: var(--spacing-8);
        text-align: center;
        max-width: 500px;
        width: 100%;
        box-shadow: var(--shadow-xl);
    }
    .error-code {
        font-size: 5rem;
        font-weight: 700;
        color: var(--danger);
        margin-bottom: var(--spacing-4);
    }
    .error-message {
        background: var(--gray-50);
        padding: var(--spacing-4);
        border-radius: var(--radius);
        margin: var(--spacing-5) 0;
        text-align: left;
        border-left: 4px solid var(--danger);
    }
  </style>
</head>
<body>
<div class="error-container">
  <div class="error-code" th:text="${status}">500</div>
  <h2 th:text="${error}">Internal Server Error</h2>
  <div class="error-message" th:text="${message}">
    Something went wrong. Please try again later.
  </div>
  <div style="display: flex; gap: var(--spacing-3); justify-content: center;">
    <a href="javascript:history.back()" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Go Back</a>
    <a href="/dashboard" class="btn btn-primary"><i class="fas fa-home"></i> Dashboard</a>
  </div>
</div>
</body>
</html>
