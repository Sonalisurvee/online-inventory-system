<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">Sale Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .detail-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        overflow: hidden;
        box-shadow: var(--shadow-md);
    }
    .detail-header {
        background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
        padding: var(--spacing-6);
        color: var(--white);
    }
    .detail-header h2 {
        color: var(--white);
        margin-bottom: var(--spacing-1);
    }
    .detail-body {
        padding: var(--spacing-6);
    }
    .detail-row {
        display: flex;
        padding: var(--spacing-3) 0;
        border-bottom: 1px solid var(--gray-200);
    }
    .detail-row:last-child {
        border-bottom: none;
    }
    .detail-label {
        width: 140px;
        color: var(--gray-500);
        font-weight: 500;
    }
    .detail-value {
        flex: 1;
        color: var(--gray-700);
    }
    .btn-group {
        padding: var(--spacing-6);
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: var(--spacing-3);
        flex-wrap: wrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-receipt"></i>
        <h1 th:text="${title}">Sale Details</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <form th:action="@{/logout}" method="post" style="display: inline;">
          <button type="submit" class="logout-btn" style="background: none; border: none; color: white; cursor: pointer;">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="detail-card">
    <div class="detail-header">
      <h2><i class="fas fa-receipt"></i> Invoice: <span th:text="${sale.invoiceNo}">SALE001</span></h2>
    </div>

    <div class="detail-body">
      <div class="detail-row">
        <div class="detail-label">Date</div>
        <div class="detail-value" th:text="${#temporals.format(sale.saleDate, 'dd MMM yyyy')}">2025-03-19</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Store</div>
        <div class="detail-value" th:text="${sale.store.name}">Store</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Product</div>
        <div class="detail-value" th:text="${sale.product.name}">Product</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Quantity</div>
        <div class="detail-value" th:text="${sale.quantity}">1</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Unit Price</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(sale.unitPrice,1,2)}">₹100</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Total Price</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(sale.totalPrice,1,2)}">₹100</div>
      </div>
      <div class="detail-row" th:if="${sale.discount != null and sale.discount > 0}">
        <div class="detail-label">Discount</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(sale.discount,1,2)}">₹0</div>
      </div>
      <div class="detail-row" th:if="${sale.tax != null and sale.tax > 0}">
        <div class="detail-label">Tax</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(sale.tax,1,2)}">₹0</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Grand Total</div>
        <div class="detail-value price" th:text="'₹' + ${#numbers.formatDecimal(sale.grandTotal,1,2)}">₹100</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Payment Method</div>
        <div class="detail-value" th:text="${sale.paymentMethod}">CASH</div>
      </div>
      <div class="detail-row" th:if="${sale.customerName}">
        <div class="detail-label">Customer</div>
        <div class="detail-value" th:text="${sale.customerName}">John</div>
      </div>
      <div class="detail-row" th:if="${sale.notes}">
        <div class="detail-label">Notes</div>
        <div class="detail-value" th:text="${sale.notes}">Notes</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Cashier</div>
        <div class="detail-value" th:text="${sale.user.username}">admin</div>
      </div>
    </div>

    <div class="btn-group">
      <a th:href="@{/sales/invoice/{id}(id=${sale.id})}" class="btn btn-primary"><i class="fas fa-print"></i> Print Invoice</a>
      <a href="/sales" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to List</a>
    </div>
  </div>

  <div class="back-link">
    <a href="/dashboard"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
  </div>
</div>
</body>
</html>
