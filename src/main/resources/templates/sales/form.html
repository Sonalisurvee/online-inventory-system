<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title th:text="${title}">New Sale</title>

  <style>
    /* Keep your existing styles */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #f5f7fa;
        padding: 20px;
    }

    .container {
        max-width: 700px;
        margin: 0 auto;
    }

    .header {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        margin-bottom: 20px;
    }

    .header h1 {
        color: #333;
        font-size: 24px;
    }

    .form-container {
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .form-group {
        margin-bottom: 20px;
    }

    .form-row {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row .form-group {
        flex: 1;
        margin-bottom: 0;
    }

    label {
        display: block;
        margin-bottom: 5px;
        color: #4a5568;
        font-weight: 500;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px;
        border: 2px solid #e2e8f0;
        border-radius: 5px;
        font-size: 14px;
        transition: border-color 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        outline: none;
        border-color: #667eea;
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 30px;
    }

    .btn {
        padding: 12px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 500;
        text-decoration: none;
        display: inline-block;
        transition: all 0.3s;
        flex: 1;
        text-align: center;
    }

    .btn-primary {
        background: #667eea;
        color: white;
    }

    .btn-primary:hover {
        background: #5a67d8;
    }

    .btn-secondary {
        background: #a0aec0;
        color: white;
    }

    .btn-secondary:hover {
        background: #718096;
    }

    .alert {
        padding: 15px;
        border-radius: 5px;
        margin-bottom: 20px;
    }

    .alert-error {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .required:after {
        content: " *";
        color: #f56565;
    }

    .info-text {
        font-size: 12px;
        color: #718096;
        margin-top: 5px;
    }

    .back-link {
        margin-top: 20px;
        text-align: center;
    }

    .back-link a {
        color: #667eea;
        text-decoration: none;
    }

    .back-link a:hover {
        text-decoration: underline;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1 th:text="${title}">New Sale</h1>
    <a href="javascript:history.back()" class="back-btn">← Back</a>
  </div>
  <div th:if="${error}" class="alert-error" th:text="${error}"></div>
  <div class="form-card">
    <form th:action="@{/sales/save}" method="post" th:object="${sale}">
      <!-- Hidden ID if editing -->
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <!-- Invoice Number (readonly, auto-generated) -->
      <div class="form-group">
        <label>Invoice Number</label>
        <input type="text" th:field="*{invoiceNo}" readonly class="readonly">
      </div>

      <!-- Store -->
      <div class="form-group">
        <label>Store *</label>
        <select name="storeId" required>
          <option value="">-- Select Store --</option>
          <option th:each="s : ${stores}" th:value="${s.id}" th:text="${s.name}">Store</option>
        </select>
      </div>

      <!-- Product -->
      <div class="form-group">
        <label>Product *</label>
        <select name="productId" id="productSelect" required>
          <option value="">-- Select Product --</option>
          <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name} + ' (₹' + ${#numbers.formatDecimal(p.unitPrice,1,2)} + ')'">Product</option>
        </select>
      </div>

      <!-- Quantity -->
      <div class="form-group">
        <label>Quantity *</label>
        <input type="number" th:field="*{quantity}" min="1" step="1" required>
      </div>

      <!-- Unit Price (selling price) – could be auto-filled from product, but editable for discounts -->
      <div class="form-group">
        <label>Unit Price (₹) *</label>
        <input type="number" th:field="*{unitPrice}" min="0" step="0.01" required>
      </div>

      <!-- Discount -->
      <div class="form-group">
        <label>Discount (₹)</label>
        <input type="number" th:field="*{discount}" min="0" step="0.01" value="0">
      </div>

      <!-- Tax -->
      <div class="form-group">
        <label>Tax (₹)</label>
        <input type="number" th:field="*{tax}" min="0" step="0.01" value="0">
      </div>

      <!-- Sale Date -->
      <div class="form-group">
        <label>Sale Date</label>
        <input type="date" th:field="*{saleDate}">
      </div>

      <!-- Payment Method -->
      <div class="form-group">
        <label>Payment Method</label>
        <select th:field="*{paymentMethod}">
          <option value="CASH">Cash</option>
          <option value="CARD">Card</option>
          <option value="UPI">UPI</option>
          <option value="BANK_TRANSFER">Bank Transfer</option>
        </select>
      </div>

      <!-- Customer Info -->
      <div class="form-group">
        <label>Customer Name</label>
        <input type="text" th:field="*{customerName}" placeholder="Walk-in customer">
      </div>
      <div class="form-group">
        <label>Customer Phone</label>
        <input type="text" th:field="*{customerPhone}" placeholder="Optional">
      </div>

      <!-- Notes -->
      <div class="form-group">
        <label>Notes</label>
        <textarea th:field="*{notes}" rows="2"></textarea>
      </div>

      <div class="btn-group">
        <button type="submit" class="btn btn-primary">Record Sale</button>
        <a href="/sales" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script>
  // Optional: Auto-fill unit price when product is selected (you'd need an AJAX call to get product price)
  document.getElementById('productSelect').addEventListener('change', function() {
      // In real implementation, fetch price via AJAX and set unitPrice field
      // For now, user can manually enter price.
  });
</script>
</body>
</html>
