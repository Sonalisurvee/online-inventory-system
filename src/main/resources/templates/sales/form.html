<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title th:text="${title}">New Sale</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">

  <style>
    .total-preview {
        background: var(--gray-50);
        border-radius: var(--radius);
        padding: var(--spacing-4);
        margin-top: var(--spacing-4);
        text-align: center;
        border: 1px solid var(--gray-200);
    }
    .total-preview strong {
        font-size: 1.25rem;
        color: var(--success-dark);
    }
  </style>
</head>
<body>
<div class="container">
  <div class="main-header">
    <div class="header-bar">
      <div class="header-title">
        <i class="fas fa-receipt"></i>
        <h1 th:text="${title}">New Sale</h1>
      </div>
      <div class="user-info">
        <i class="fas fa-user-circle"></i>
        <span th:text="${#authentication.name}">admin</span>
        <a href="/logout"><i class="fas fa-sign-out-alt"></i> Logout</a>
      </div>
    </div>
  </div>

  <div th:if="${error}" class="alert alert-error">
    <i class="fas fa-exclamation-circle"></i> <span th:text="${error}">Error</span>
  </div>

  <div class="form-container">
    <form th:action="@{/sales/save}" method="post" th:object="${sale}">
      <input type="hidden" name="id" th:value="*{id}" th:if="*{id != null}">

      <div class="form-group">
        <label><i class="fas fa-receipt"></i> Invoice Number</label>
        <input type="text" th:field="*{invoiceNo}" readonly class="readonly" style="background: var(--gray-100);">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-store"></i> Store</label>
          <select name="storeId" required>
            <option value="">-- Select Store --</option>
            <option th:each="s : ${stores}" th:value="${s.id}" th:text="${s.name}"></option>
          </select>
        </div>

        <div class="form-group">
          <label class="required"><i class="fas fa-box"></i> Product</label>
          <select name="productId" id="productSelect" required>
            <option value="">-- Select Product --</option>
            <option th:each="p : ${products}" th:value="${p.id}" th:text="${p.name} + ' (₹' + ${#numbers.formatDecimal(p.unitPrice, 1, 2)} + ')'"></option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required"><i class="fas fa-hashtag"></i> Quantity</label>
          <input type="number" th:field="*{quantity}" id="quantity" min="1" step="1" required>
        </div>

        <div class="form-group">
          <label class="required"><i class="fas fa-tag"></i> Unit Price (₹)</label>
          <input type="number" th:field="*{unitPrice}" id="unitPrice" min="0" step="0.01" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-gift"></i> Discount (₹)</label>
          <input type="number" th:field="*{discount}" id="discount" min="0" step="0.01" value="0">
        </div>

        <div class="form-group">
          <label><i class="fas fa-percent"></i> Tax (₹)</label>
          <input type="number" th:field="*{tax}" id="tax" min="0" step="0.01" value="0">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-calendar"></i> Sale Date</label>
          <input type="date" th:field="*{saleDate}">
        </div>

        <div class="form-group">
          <label><i class="fas fa-credit-card"></i> Payment Method</label>
          <select th:field="*{paymentMethod}">
            <option value="CASH">Cash</option>
            <option value="CARD">Card</option>
            <option value="UPI">UPI</option>
            <option value="BANK_TRANSFER">Bank Transfer</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Customer Name</label>
          <input type="text" th:field="*{customerName}" placeholder="Walk-in customer">
        </div>

        <div class="form-group">
          <label><i class="fas fa-phone"></i> Customer Phone</label>
          <input type="text" th:field="*{customerPhone}" placeholder="Optional">
        </div>
      </div>

      <div class="form-group">
        <label><i class="fas fa-pen"></i> Notes</label>
        <textarea th:field="*{notes}" rows="2" placeholder="Optional notes"></textarea>
      </div>

      <div class="total-preview" id="totalPreview">
        <span><i class="fas fa-calculator"></i> Grand Total:</span>
        <strong id="grandTotal">₹0.00</strong>
      </div>

      <div class="btn-group" style="display: flex; gap: var(--spacing-3); margin-top: var(--spacing-6);">
        <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Record Sale</button>
        <a href="/sales" class="btn btn-secondary"><i class="fas fa-times"></i> Cancel</a>
      </div>
    </form>
  </div>

  <div class="back-link">
    <a href="/sales"><i class="fas fa-arrow-left"></i> Back to Sales</a>
  </div>
</div>

<script>
  const quantity = document.getElementById('quantity');
  const unitPrice = document.getElementById('unitPrice');
  const discount = document.getElementById('discount');
  const tax = document.getElementById('tax');
  const grandTotalSpan = document.getElementById('grandTotal');

  function updateTotal() {
      const qty = parseFloat(quantity.value) || 0;
      const price = parseFloat(unitPrice.value) || 0;
      const disc = parseFloat(discount.value) || 0;
      const t = parseFloat(tax.value) || 0;

      const subtotal = qty * price;
      const total = subtotal - disc + t;
      grandTotalSpan.textContent = '₹' + total.toFixed(2);
  }

  quantity.addEventListener('input', updateTotal);
  unitPrice.addEventListener('input', updateTotal);
  discount.addEventListener('input', updateTotal);
  tax.addEventListener('input', updateTotal);
</script>
</body>
</html>
